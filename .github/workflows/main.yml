name: Release Build

on:
  push:
    tags:
      - '[Vv]*'
  workflow_dispatch:
    inputs:
      BRAND:
        description: 'Brand to build: empty = all (maclaw + tigerclaw), "maclaw" = maclaw only, "qianxin" = tigerclaw only'
        required: false
        default: ''
        type: string

permissions:
  contents: write

env:
  APP_NAME: MaClaw
  GO_VERSION: '1.25.0'
  NODE_VERSION: '20'

jobs:
  # ============================================================
  # Windows: GUI (amd64/arm64) + TUI + maclaw-tool + NSIS installer
  # ============================================================
  build-windows:
    runs-on: windows-latest
    strategy:
      matrix:
        brand: ${{ inputs.BRAND == 'maclaw' && fromJSON('[""]') || inputs.BRAND == 'qianxin' && fromJSON('["qianxin"]') || fromJSON('["", "qianxin"]') }}
    steps:
      - uses: actions/checkout@v4

      - name: Compute brand variables
        shell: pwsh
        run: |
          $brand = "${{ matrix.brand }}"
          if ($brand -ne "") {
            # Brand display name mapping
            $displayNames = @{ "qianxin" = "TigerClaw" }
            $icoNames = @{ "qianxin" = "tigerclaw" }
            $displayName = if ($displayNames.ContainsKey($brand)) { $displayNames[$brand] } else { $brand }
            $icoName = if ($icoNames.ContainsKey($brand)) { $icoNames[$brand] } else { $brand }
            echo "BRAND_TAG=oem_${brand}" >> $env:GITHUB_ENV
            echo "BRAND_ICON_ICO=assets/${icoName}.ico" >> $env:GITHUB_ENV
            echo "BRAND_ICON_PNG=assets/${brand}.png" >> $env:GITHUB_ENV
            echo "BRAND_APP_NAME=${displayName}" >> $env:GITHUB_ENV
            echo "BRAND_DISPLAY_NAME=${displayName}" >> $env:GITHUB_ENV
          } else {
            echo "BRAND_TAG=" >> $env:GITHUB_ENV
            echo "BRAND_ICON_ICO=build/windows/icon.ico" >> $env:GITHUB_ENV
            echo "BRAND_ICON_PNG=build/appicon.png" >> $env:GITHUB_ENV
            echo "BRAND_APP_NAME=$env:APP_NAME" >> $env:GITHUB_ENV
            echo "BRAND_DISPLAY_NAME=$env:APP_NAME" >> $env:GITHUB_ENV
          }

      - uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}
          cache: true

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
          cache-dependency-path: gui/frontend/package-lock.json

      - name: Extract version from wails.json
        shell: pwsh
        run: |
          $cfg = Get-Content wails.json -Raw | ConvertFrom-Json
          $version = $cfg.info.productVersion
          echo "VERSION=$version" >> $env:GITHUB_ENV

      - name: Build frontend
        shell: pwsh
        run: |
          cd gui/frontend
          npm ci --cache ./.npm_cache
          npm run build

      - name: Install goversioninfo
        shell: pwsh
        run: go install github.com/josephspurrier/goversioninfo/cmd/goversioninfo@latest

      - name: Generate ICO from PNG if needed
        shell: pwsh
        run: |
          $ico = $env:BRAND_ICON_ICO
          if ($ico -and -not (Test-Path $ico)) {
            $png = $ico -replace '\.ico$', '.png'
            if (-not (Test-Path $png)) {
              Write-Error "Neither $ico nor $png found"; exit 1
            }
            Write-Host "Converting $png -> $ico (multi-size)"
            Add-Type -AssemblyName System.Drawing
            $src = [System.Drawing.Bitmap]::FromFile((Resolve-Path $png))
            # Build ICO binary: header + directory entries + PNG data for each size
            $sizes = @(256, 128, 64, 48, 32, 16)
            $ms = New-Object System.IO.MemoryStream
            $bw = New-Object System.IO.BinaryWriter($ms)
            # ICO header: reserved(2) + type=1(2) + count(2)
            $bw.Write([uint16]0); $bw.Write([uint16]1); $bw.Write([uint16]$sizes.Count)
            # Collect PNG data first to calculate offsets
            $pngDataList = @()
            foreach ($sz in $sizes) {
              $resized = New-Object System.Drawing.Bitmap($src, $sz, $sz)
              $pngMs = New-Object System.IO.MemoryStream
              $resized.Save($pngMs, [System.Drawing.Imaging.ImageFormat]::Png)
              $pngDataList += ,($pngMs.ToArray())
              $pngMs.Dispose(); $resized.Dispose()
            }
            # Directory entries offset starts after header(6) + entries(16 * count)
            $dataOffset = 6 + 16 * $sizes.Count
            for ($i = 0; $i -lt $sizes.Count; $i++) {
              $sz = $sizes[$i]; $data = $pngDataList[$i]
              $bw.Write([byte]$(if ($sz -ge 256) { 0 } else { $sz }))  # width
              $bw.Write([byte]$(if ($sz -ge 256) { 0 } else { $sz }))  # height
              $bw.Write([byte]0)       # color palette
              $bw.Write([byte]0)       # reserved
              $bw.Write([uint16]1)     # color planes
              $bw.Write([uint16]32)    # bits per pixel
              $bw.Write([uint32]$data.Length)  # image data size
              $bw.Write([uint32]$dataOffset)   # offset
              $dataOffset += $data.Length
            }
            # Write PNG data
            foreach ($data in $pngDataList) { $bw.Write($data) }
            [System.IO.File]::WriteAllBytes($ico, $ms.ToArray())
            $bw.Dispose(); $ms.Dispose(); $src.Dispose()
            Write-Host "Created $ico with sizes: $($sizes -join ', ')"
          }

      - name: Generate Windows resources & build GUI
        shell: pwsh
        run: |
          $cfg = Get-Content wails.json -Raw | ConvertFrom-Json
          # Prepare manifest
          $manifest = Get-Content build/windows/wails.exe.manifest -Raw
          $manifest = $manifest.Replace('{{.Name}}', $cfg.name).Replace('{{.Info.ProductVersion}}', $env:VERSION)
          [System.IO.File]::WriteAllText("build/windows/wails.exe.manifest.tmp", $manifest, [System.Text.UTF8Encoding]::new($false))
          # Prepare versioninfo.json
          $parts = $env:VERSION.Split('.')
          $versionInfo = @{
            FixedFileInfo = @{
              FileVersion    = @{ Major=[int]$parts[0]; Minor=[int]$parts[1]; Patch=[int]$parts[2]; Build=[int]$parts[3] }
              ProductVersion = @{ Major=[int]$parts[0]; Minor=[int]$parts[1]; Patch=[int]$parts[2]; Build=[int]$parts[3] }
            }
            StringFileInfo = @{
              CompanyName     = $cfg.info.companyName
              FileDescription = $cfg.info.productName
              FileVersion     = $env:VERSION
              ProductName     = $cfg.info.productName
              ProductVersion  = $env:VERSION
              LegalCopyright  = $cfg.info.copyright
            }
            VarFileInfo = @{ Translation = @{ LangID='0409'; CharsetID='04B0' } }
          } | ConvertTo-Json -Depth 6
          [System.IO.File]::WriteAllText("build/windows/versioninfo.json.tmp", $versionInfo, [System.Text.UTF8Encoding]::new($false))

          $goversioninfo = Join-Path (go env GOPATH) "bin/goversioninfo.exe"
          New-Item -ItemType Directory -Force -Path dist | Out-Null

          # Determine build tags
          $guiTags = "desktop,production"
          if ($env:BRAND_TAG -ne "") { $guiTags = "$guiTags,$($env:BRAND_TAG)" }
          $outName = $env:BRAND_APP_NAME

          # --- amd64 ---
          & $goversioninfo -64 -icon $env:BRAND_ICON_ICO -manifest build/windows/wails.exe.manifest.tmp -o gui/resource_windows_amd64.syso build/windows/versioninfo.json.tmp
          $env:GOOS='windows'; $env:GOARCH='amd64'; $env:CGO_ENABLED='0'
          go build -tags $guiTags -ldflags "-s -w -H windowsgui" -o "dist/${outName}_amd64.exe" ./gui/
          Remove-Item gui/resource_windows_amd64.syso -ErrorAction SilentlyContinue

          # --- arm64 ---
          & $goversioninfo -64 -arm -icon $env:BRAND_ICON_ICO -manifest build/windows/wails.exe.manifest.tmp -o gui/resource_windows_arm64.syso build/windows/versioninfo.json.tmp
          $env:GOARCH='arm64'
          go build -tags $guiTags -ldflags "-s -w -H windowsgui" -o "dist/${outName}_arm64.exe" ./gui/
          Remove-Item gui/resource_windows_arm64.syso -ErrorAction SilentlyContinue

          Remove-Item build/windows/wails.exe.manifest.tmp, build/windows/versioninfo.json.tmp

      - name: Build TUI & maclaw-tool
        shell: pwsh
        run: |
          $ldflags = "-s -w -X main.version=$env:VERSION"
          $tuiTags = ""
          if ($env:BRAND_TAG -ne "") { $tuiTags = $env:BRAND_TAG }
          $outPrefix = $env:BRAND_APP_NAME.ToLower()
          foreach ($arch in @('amd64','arm64')) {
            $env:GOOS='windows'; $env:GOARCH=$arch; $env:CGO_ENABLED='0'
            if ($tuiTags -ne "") {
              go build -tags $tuiTags -ldflags $ldflags -o "dist/${outPrefix}-tui_${arch}.exe" ./tui/
              go build -tags $tuiTags -ldflags $ldflags -o "dist/${outPrefix}-tool_${arch}.exe" ./cmd/maclaw-tool/
            } else {
              go build -ldflags $ldflags -o "dist/maclaw-tui_${arch}.exe" ./tui/
              go build -ldflags $ldflags -o "dist/maclaw-tool_${arch}.exe" ./cmd/maclaw-tool/
            }
          }

      - name: Install NSIS
        shell: pwsh
        run: choco install nsis -y --no-progress

      - name: Create NSIS installer
        shell: pwsh
        run: |
          $cfg = Get-Content wails.json -Raw | ConvertFrom-Json
          $nsis = "C:\Program Files (x86)\NSIS\makensis.exe"
          $root = (Get-Location).Path
          $outName = $env:BRAND_APP_NAME
          & $nsis /DINFO_PROJECTNAME="${outName}" `
                  /DPRODUCT_EXECUTABLE="${outName}.exe" `
                  /DINFO_PRODUCTNAME="$($env:BRAND_DISPLAY_NAME)" `
                  /DINFO_COMPANYNAME="$($cfg.info.companyName)" `
                  /DINFO_COPYRIGHT="$($cfg.info.copyright)" `
                  /DINFO_PRODUCTVERSION="$env:VERSION" `
                  /DARG_WAILS_AMD64_BINARY="$root\dist\${outName}_amd64.exe" `
                  /DARG_WAILS_ARM64_BINARY="$root\dist\${outName}_arm64.exe" `
                  /DMUI_ICON_PATH="$root\$($env:BRAND_ICON_ICO)" `
                  build/windows/installer/multiarch.nsi

      - name: Create portable zip
        shell: pwsh
        run: |
          $outName = $env:BRAND_APP_NAME
          $outPrefix = $env:BRAND_APP_NAME.ToLower()
          Copy-Item "dist/${outName}_amd64.exe" "dist/${outName}.exe"
          if ($env:BRAND_TAG -ne "") {
            Copy-Item "dist/${outPrefix}-tui_amd64.exe" "dist/${outPrefix}-tui.exe"
            Copy-Item "dist/${outPrefix}-tool_amd64.exe" "dist/${outPrefix}-tool.exe"
            Compress-Archive -Path "dist/${outName}.exe","dist/${outPrefix}-tui.exe","dist/${outPrefix}-tool.exe" `
              -DestinationPath "dist/${outName}-Windows-Portable.zip" -Force
          } else {
            Copy-Item "dist/maclaw-tui_amd64.exe" "dist/maclaw-tui.exe"
            Copy-Item "dist/maclaw-tool_amd64.exe" "dist/maclaw-tool.exe"
            Compress-Archive -Path "dist/${outName}.exe","dist/maclaw-tui.exe","dist/maclaw-tool.exe" `
              -DestinationPath "dist/${outName}-Windows-Portable.zip" -Force
          }

      - name: Upload Windows artifacts
        uses: actions/upload-artifact@v4
        with:
          name: windows-artifacts-${{ matrix.brand || 'default' }}
          path: |
            dist/${{ env.BRAND_APP_NAME }}-Setup.exe
            dist/${{ env.BRAND_APP_NAME }}-Windows-Portable.zip
            dist/${{ env.BRAND_APP_NAME }}_amd64.exe
            dist/${{ env.BRAND_APP_NAME }}_arm64.exe
            dist/*-tui_amd64.exe
            dist/*-tui_arm64.exe
            dist/*-tool_amd64.exe
            dist/*-tool_arm64.exe
            dist/maclaw-tui_amd64.exe
            dist/maclaw-tui_arm64.exe
            dist/maclaw-tool_amd64.exe
            dist/maclaw-tool_arm64.exe


  # ============================================================
  # macOS: GUI universal binary + PKG + TUI/tool (darwin)
  # ============================================================
  build-macos:
    runs-on: macos-latest
    strategy:
      matrix:
        brand: ${{ inputs.BRAND == 'maclaw' && fromJSON('[""]') || inputs.BRAND == 'qianxin' && fromJSON('["qianxin"]') || fromJSON('["", "qianxin"]') }}
    steps:
      - uses: actions/checkout@v4

      - name: Compute brand variables
        run: |
          BRAND="${{ matrix.brand }}"
          if [ -n "$BRAND" ]; then
            # Brand display name mapping (case instead of declare -A for macOS bash 3.x compat)
            case "$BRAND" in
              qianxin) DISPLAY_NAME="TigerClaw" ;;
              *)       DISPLAY_NAME="$BRAND" ;;
            esac
            echo "BRAND_TAG=oem_${BRAND}" >> $GITHUB_ENV
            echo "BRAND_ICON_PNG=assets/${BRAND}.png" >> $GITHUB_ENV
            echo "BRAND_APP_NAME=${DISPLAY_NAME}" >> $GITHUB_ENV
            echo "BRAND_DISPLAY_NAME=${DISPLAY_NAME}" >> $GITHUB_ENV
          else
            echo "BRAND_TAG=" >> $GITHUB_ENV
            echo "BRAND_ICON_PNG=build/appicon.png" >> $GITHUB_ENV
            echo "BRAND_APP_NAME=${APP_NAME}" >> $GITHUB_ENV
            echo "BRAND_DISPLAY_NAME=${APP_NAME}" >> $GITHUB_ENV
          fi

      - uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}
          cache: true

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
          cache-dependency-path: gui/frontend/package-lock.json

      - name: Extract version from wails.json
        run: |
          VERSION=$(python3 -c "import json; print(json.load(open('wails.json'))['info']['productVersion'])")
          echo "VERSION=$VERSION" >> $GITHUB_ENV

      - name: Build frontend
        run: |
          cd gui/frontend
          npm ci --cache ./.npm_cache
          npm run build

      - name: Build macOS GUI binaries
        env:
          MACOSX_DEPLOYMENT_TARGET: '11.0'
        run: |
          mkdir -p dist build/bin
          GUI_TAGS="desktop,production"
          if [ -n "$BRAND_TAG" ]; then GUI_TAGS="${GUI_TAGS},${BRAND_TAG}"; fi
          OUT_NAME="${BRAND_APP_NAME}"
          # amd64
          CGO_ENABLED=1 CGO_LDFLAGS="-weak_framework UniformTypeIdentifiers" \
            GOOS=darwin GOARCH=amd64 \
            go build -tags "${GUI_TAGS}" -o "build/bin/${OUT_NAME}_amd64" ./gui/
          # arm64
          CGO_ENABLED=1 CGO_LDFLAGS="-weak_framework UniformTypeIdentifiers" \
            GOOS=darwin GOARCH=arm64 \
            go build -tags "${GUI_TAGS}" -o "build/bin/${OUT_NAME}_arm64" ./gui/

      - name: Build TUI & maclaw-tool (darwin)
        run: |
          LDFLAGS="-s -w -X main.version=${VERSION}"
          TUI_TAGS=""
          if [ -n "$BRAND_TAG" ]; then TUI_TAGS="$BRAND_TAG"; fi
          OUT_PREFIX=$(echo "$BRAND_APP_NAME" | tr '[:upper:]' '[:lower:]')
          for ARCH in amd64 arm64; do
            if [ -n "$TUI_TAGS" ]; then
              CGO_ENABLED=0 GOOS=darwin GOARCH=$ARCH \
                go build -tags "$TUI_TAGS" -ldflags "$LDFLAGS" -o "dist/${OUT_PREFIX}-tui_${ARCH}_darwin" ./tui/
              CGO_ENABLED=0 GOOS=darwin GOARCH=$ARCH \
                go build -tags "$TUI_TAGS" -ldflags "$LDFLAGS" -o "dist/${OUT_PREFIX}-tool_${ARCH}_darwin" ./cmd/maclaw-tool/
            else
              CGO_ENABLED=0 GOOS=darwin GOARCH=$ARCH \
                go build -ldflags "$LDFLAGS" -o "dist/maclaw-tui_${ARCH}_darwin" ./tui/
              CGO_ENABLED=0 GOOS=darwin GOARCH=$ARCH \
                go build -ldflags "$LDFLAGS" -o "dist/maclaw-tool_${ARCH}_darwin" ./cmd/maclaw-tool/
            fi
          done

      - name: Generate .icns
        run: |
          ICON_SRC="${BRAND_ICON_PNG}"
          if [ -f "$ICON_SRC" ]; then
            ICONSET=build/appicon.iconset
            mkdir -p "$ICONSET"
            for sz in 16 32 64 128 256 512 1024; do
              sips -z $sz $sz "$ICON_SRC" --out "$ICONSET/icon_${sz}x${sz}.png" > /dev/null
            done
            # Retina variants
            cp "$ICONSET/icon_32x32.png"   "$ICONSET/icon_16x16@2x.png"
            cp "$ICONSET/icon_64x64.png"   "$ICONSET/icon_32x32@2x.png"
            cp "$ICONSET/icon_256x256.png" "$ICONSET/icon_128x128@2x.png"
            cp "$ICONSET/icon_512x512.png" "$ICONSET/icon_256x256@2x.png"
            cp "$ICONSET/icon_1024x1024.png" "$ICONSET/icon_512x512@2x.png"
            rm -f "$ICONSET/icon_64x64.png" "$ICONSET/icon_1024x1024.png"
            iconutil -c icns "$ICONSET" -o build/AppIcon.icns
            rm -rf "$ICONSET"
          fi

      - name: Create App Bundles & Universal Binary
        run: |
          IDENTIFIER="com.wails.MaClaw"
          OUT_NAME="${BRAND_APP_NAME}"
          DISPLAY_NAME="${BRAND_DISPLAY_NAME}"
          for ARCH in amd64 arm64; do
            BUNDLE="dist/${OUT_NAME}_${ARCH}.app"
            mkdir -p "$BUNDLE/Contents/MacOS" "$BUNDLE/Contents/Resources"
            cp "build/bin/${OUT_NAME}_${ARCH}" "$BUNDLE/Contents/MacOS/${OUT_NAME}"
            chmod +x "$BUNDLE/Contents/MacOS/${OUT_NAME}"
            [ -f build/AppIcon.icns ] && cp build/AppIcon.icns "$BUNDLE/Contents/Resources/"
            cat > "$BUNDLE/Contents/Info.plist" <<PEOF
          <?xml version="1.0" encoding="UTF-8"?>
          <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
          <plist version="1.0"><dict>
            <key>CFBundlePackageType</key><string>APPL</string>
            <key>CFBundleName</key><string>${DISPLAY_NAME}</string>
            <key>CFBundleExecutable</key><string>${OUT_NAME}</string>
            <key>CFBundleIdentifier</key><string>${IDENTIFIER}</string>
            <key>CFBundleVersion</key><string>${VERSION}</string>
            <key>CFBundleShortVersionString</key><string>${VERSION}</string>
            <key>CFBundleIconFile</key><string>AppIcon</string>
            <key>LSMinimumSystemVersion</key><string>11.0</string>
            <key>NSHighResolutionCapable</key><string>true</string>
            <key>NSDesktopFolderUsageDescription</key><string>${DISPLAY_NAME} needs access to your Desktop folder to manage project files.</string>
            <key>NSDocumentsFolderUsageDescription</key><string>${DISPLAY_NAME} needs access to your Documents folder to manage project files.</string>
            <key>NSDownloadsFolderUsageDescription</key><string>${DISPLAY_NAME} needs access to your Downloads folder to install tools and updates.</string>
            <key>NSLocalNetworkUsageDescription</key><string>${DISPLAY_NAME} uses local network to discover and connect to Hub services.</string>
            <key>NSScreenCaptureUsageDescription</key><string>${DISPLAY_NAME} needs screen recording permission to capture screenshots for remote coding sessions.</string>
          </dict></plist>
          PEOF
            # Strip leading whitespace from plist (heredoc indentation artifact)
            sed -i '' 's/^[[:space:]]*//' "$BUNDLE/Contents/Info.plist"
          done
          # Universal
          UBUNDLE="dist/${OUT_NAME}.app"
          mkdir -p "$UBUNDLE/Contents/MacOS" "$UBUNDLE/Contents/Resources"
          lipo -create "build/bin/${OUT_NAME}_amd64" "build/bin/${OUT_NAME}_arm64" \
            -output "$UBUNDLE/Contents/MacOS/${OUT_NAME}"
          cp "dist/${OUT_NAME}_arm64.app/Contents/Info.plist" "$UBUNDLE/Contents/Info.plist"
          cp -R "dist/${OUT_NAME}_arm64.app/Contents/Resources/" "$UBUNDLE/Contents/Resources/"

      - name: Create PKGs
        run: |
          IDENTIFIER="com.wails.MaClaw"
          OUT_NAME="${BRAND_APP_NAME}"
          for ARCH in amd64 arm64 universal; do
            if [ "$ARCH" = "universal" ]; then
              BUNDLE="dist/${OUT_NAME}.app"
              PKG_NAME="${OUT_NAME}-Universal.pkg"
              SCRIPTS_DIR="build/scripts_universal"
            else
              BUNDLE="dist/${OUT_NAME}_${ARCH}.app"
              PKG_NAME="${OUT_NAME}-${ARCH}.pkg"
              [ "$ARCH" = "arm64" ] && SCRIPTS_DIR="build/scripts_arm64" || SCRIPTS_DIR="build/scripts_x64"
            fi
            TEMP_ROOT="build/pkg_root_${ARCH}"
            rm -rf "$TEMP_ROOT"
            mkdir -p "$TEMP_ROOT/Applications"
            cp -R "$BUNDLE" "$TEMP_ROOT/Applications/${OUT_NAME}.app"
            chmod +x "$SCRIPTS_DIR/preinstall" "$SCRIPTS_DIR/postinstall"
            pkgbuild --root "$TEMP_ROOT" --identifier "$IDENTIFIER" --version "$VERSION" \
              --install-location "/" --scripts "$SCRIPTS_DIR" "dist/${PKG_NAME}"
            rm -rf "$TEMP_ROOT"
          done

      - name: Upload macOS artifacts
        uses: actions/upload-artifact@v4
        with:
          name: macos-artifacts-${{ matrix.brand || 'default' }}
          path: |
            dist/${{ env.BRAND_APP_NAME }}-Universal.pkg
            dist/${{ env.BRAND_APP_NAME }}-amd64.pkg
            dist/${{ env.BRAND_APP_NAME }}-arm64.pkg
            dist/*-tui_amd64_darwin
            dist/*-tui_arm64_darwin
            dist/*-tool_amd64_darwin
            dist/*-tool_arm64_darwin
            dist/maclaw-tui_amd64_darwin
            dist/maclaw-tui_arm64_darwin
            dist/maclaw-tool_amd64_darwin
            dist/maclaw-tool_arm64_darwin


  # ============================================================
  # Linux: GUI (amd64, CGO native) + TUI/tool + AppImage
  # ============================================================
  build-linux:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        brand: ${{ inputs.BRAND == 'maclaw' && fromJSON('[""]') || inputs.BRAND == 'qianxin' && fromJSON('["qianxin"]') || fromJSON('["", "qianxin"]') }}
    steps:
      - uses: actions/checkout@v4

      - name: Compute brand variables
        run: |
          BRAND="${{ matrix.brand }}"
          if [ -n "$BRAND" ]; then
            case "$BRAND" in
              qianxin) DISPLAY_NAME="TigerClaw" ;;
              *)       DISPLAY_NAME="$BRAND" ;;
            esac
            echo "BRAND_TAG=oem_${BRAND}" >> $GITHUB_ENV
            echo "BRAND_ICON_PNG=assets/${BRAND}.png" >> $GITHUB_ENV
            echo "BRAND_APP_NAME=${DISPLAY_NAME}" >> $GITHUB_ENV
            echo "BRAND_DISPLAY_NAME=${DISPLAY_NAME}" >> $GITHUB_ENV
          else
            echo "BRAND_TAG=" >> $GITHUB_ENV
            echo "BRAND_ICON_PNG=build/appicon.png" >> $GITHUB_ENV
            echo "BRAND_APP_NAME=${APP_NAME}" >> $GITHUB_ENV
            echo "BRAND_DISPLAY_NAME=${APP_NAME}" >> $GITHUB_ENV
          fi

      - uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}
          cache: true

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
          cache-dependency-path: gui/frontend/package-lock.json

      - name: Install Linux GUI dependencies
        run: |
          sudo apt-get update
          # Try 4.0 first (Ubuntu 22.04), fall back to 4.1 (Ubuntu 24.04+)
          if sudo apt-get install -y libgtk-3-dev libwebkit2gtk-4.0-dev 2>/dev/null; then
            TAGS="desktop,production"
          else
            sudo apt-get install -y libgtk-3-dev libwebkit2gtk-4.1-dev
            TAGS="desktop,production,webkit2_41"
          fi
          if [ -n "$BRAND_TAG" ]; then TAGS="${TAGS},${BRAND_TAG}"; fi
          echo "WEBKIT_TAGS=${TAGS}" >> $GITHUB_ENV

      - name: Extract version from wails.json
        run: |
          VERSION=$(python3 -c "import json; print(json.load(open('wails.json'))['info']['productVersion'])")
          echo "VERSION=$VERSION" >> $GITHUB_ENV

      - name: Build frontend
        run: |
          cd gui/frontend
          npm ci --cache ./.npm_cache
          npm run build

      - name: Build Linux GUI (amd64)
        run: |
          mkdir -p dist build/bin
          OUT_NAME="${BRAND_APP_NAME}"
          CGO_ENABLED=1 GOOS=linux GOARCH=amd64 \
            go build -tags "${WEBKIT_TAGS}" -o "build/bin/${OUT_NAME}_amd64_linux" ./gui/

      - name: Build TUI & maclaw-tool (linux)
        run: |
          LDFLAGS="-s -w -X main.version=${VERSION}"
          TUI_TAGS=""
          if [ -n "$BRAND_TAG" ]; then TUI_TAGS="$BRAND_TAG"; fi
          OUT_PREFIX=$(echo "$BRAND_APP_NAME" | tr '[:upper:]' '[:lower:]')
          for ARCH in amd64 arm64; do
            if [ -n "$TUI_TAGS" ]; then
              CGO_ENABLED=0 GOOS=linux GOARCH=$ARCH \
                go build -tags "$TUI_TAGS" -ldflags "$LDFLAGS" -o "dist/${OUT_PREFIX}-tui_${ARCH}_linux" ./tui/
              CGO_ENABLED=0 GOOS=linux GOARCH=$ARCH \
                go build -tags "$TUI_TAGS" -ldflags "$LDFLAGS" -o "dist/${OUT_PREFIX}-tool_${ARCH}_linux" ./cmd/maclaw-tool/
            else
              CGO_ENABLED=0 GOOS=linux GOARCH=$ARCH \
                go build -ldflags "$LDFLAGS" -o "dist/maclaw-tui_${ARCH}_linux" ./tui/
              CGO_ENABLED=0 GOOS=linux GOARCH=$ARCH \
                go build -ldflags "$LDFLAGS" -o "dist/maclaw-tool_${ARCH}_linux" ./cmd/maclaw-tool/
            fi
          done

      - name: Create AppImage (amd64)
        run: |
          OUT_NAME="${BRAND_APP_NAME}"
          OUT_LOWER=$(echo "$OUT_NAME" | tr '[:upper:]' '[:lower:]')
          # Prepare AppDir
          APP_DIR="build/linux/AppDir_amd64"
          rm -rf "$APP_DIR"
          mkdir -p "$APP_DIR/usr/bin"
          mkdir -p "$APP_DIR/usr/share/icons/hicolor/512x512/apps"
          cp "build/bin/${OUT_NAME}_amd64_linux" "$APP_DIR/usr/bin/${OUT_LOWER}"
          cp "${BRAND_ICON_PNG}" "$APP_DIR/${OUT_LOWER}.png"
          cp "${BRAND_ICON_PNG}" "$APP_DIR/.DirIcon"

          # Desktop file (no leading spaces allowed)
          cat > "$APP_DIR/${OUT_LOWER}.desktop" << DEOF
          [Desktop Entry]
          Name=${BRAND_DISPLAY_NAME}
          Exec=${OUT_LOWER}
          Icon=${OUT_LOWER}
          Type=Application
          Categories=Development;
          DEOF
          sed -i 's/^[[:space:]]*//' "$APP_DIR/${OUT_LOWER}.desktop"

          # AppRun (shebang must be at column 0)
          cat > "$APP_DIR/AppRun" << REOF
          #!/bin/bash
          HERE="\$(dirname "\$(readlink -f "\${0}")")"
          export PATH="\${HERE}/usr/bin:\${PATH}"
          exec ${OUT_LOWER} "\$@"
          REOF
          sed -i 's/^[[:space:]]*//' "$APP_DIR/AppRun"
          chmod +x "$APP_DIR/AppRun"

          # Download appimagetool
          wget -q -O appimagetool "https://github.com/AppImage/appimagetool/releases/download/continuous/appimagetool-x86_64.AppImage"
          chmod +x appimagetool
          ARCH=x86_64 ./appimagetool --appimage-extract-and-run "$APP_DIR" \
            "dist/${OUT_NAME}-${VERSION}-x86_64.AppImage"

      - name: Upload Linux artifacts
        uses: actions/upload-artifact@v4
        with:
          name: linux-artifacts-${{ matrix.brand || 'default' }}
          path: |
            dist/${{ env.BRAND_APP_NAME }}-*-x86_64.AppImage
            dist/*-tui_amd64_linux
            dist/*-tui_arm64_linux
            dist/*-tool_amd64_linux
            dist/*-tool_arm64_linux
            dist/maclaw-tui_amd64_linux
            dist/maclaw-tui_arm64_linux
            dist/maclaw-tool_amd64_linux
            dist/maclaw-tool_arm64_linux

  # ============================================================
  # Release: collect all artifacts and create GitHub Release
  # ============================================================
  release:
    needs: [build-windows, build-macos, build-linux]
    runs-on: ubuntu-latest
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: true

      - name: List artifacts
        run: find artifacts -type f | sort

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: artifacts/*
          generate_release_notes: true
          draft: false
          prerelease: ${{ contains(github.ref_name, '-') }}
