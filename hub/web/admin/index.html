<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>CodeClaw Hub Admin Console</title>
  <style>
    :root{--bg:#dfeafb;--panel:#fff;--soft:#ecf3ff;--soft-2:#e4edfb;--text:#18314f;--muted:#5f7692;--line:rgba(37,84,140,.18);--line-strong:rgba(37,84,140,.3);--primary:#2c6fca;--ok:#1f8f6a;--warn:#b98219;--danger:#bf5648;--shadow:0 18px 42px rgba(37,84,140,.16)}
    *{box-sizing:border-box} body{margin:0;background:linear-gradient(180deg,#eef5ff 0%,var(--bg) 100%);color:var(--text);font-family:"Segoe UI","PingFang SC","Microsoft YaHei",sans-serif}
    .hidden{display:none!important}.shell{padding:24px}.card{background:rgba(255,255,255,.97);border:1px solid rgba(16,31,56,.08);border-radius:22px;box-shadow:var(--shadow)}
    .login{min-height:100vh;display:flex;align-items:center;justify-content:center}.login-card{width:min(1080px,100%);display:grid;grid-template-columns:1.1fr .9fr;overflow:hidden}
    .hero{padding:36px;background:linear-gradient(165deg,#cfe0f8 0%,#88addc 58%,#4c79b8 100%);color:#123456}.hero h1{margin:16px 0 10px;font-size:34px}.hero p,.hero li{color:rgba(18,52,86,.78);line-height:1.7}
    .mini{display:inline-flex;align-items:center;padding:6px 12px;border-radius:999px;background:rgba(47,128,237,.12);color:var(--primary);font-size:12px;font-weight:700;text-transform:uppercase;letter-spacing:.08em}
    .form{padding:32px;display:flex;flex-direction:column;gap:16px;justify-content:center}.form h2{margin:0;font-size:28px}.subtle{color:var(--muted);line-height:1.6}
    .stage-toggle,.actions,.topbar,.lang-switch{display:flex;gap:10px;flex-wrap:wrap}.stage-toggle button{flex:1;min-width:160px}
    .actions{align-items:center;justify-content:flex-start}.actions button{min-width:126px}
    .stage-card{padding:20px;border:1px solid var(--line);border-radius:18px;background:var(--soft);display:grid;gap:14px}
    label{display:block;margin-bottom:8px;color:var(--muted);font-size:12px;font-weight:800;letter-spacing:.03em}
    input,select{width:100%;height:44px;padding:0 14px;border-radius:12px;border:1px solid var(--line);font:inherit;background:#fff;color:var(--text);transition:border-color .18s ease,box-shadow .18s ease,background .18s ease}
    input:hover,select:hover{border-color:var(--line-strong)} input:focus,select:focus{outline:none;border-color:rgba(47,128,237,.45);box-shadow:0 0 0 4px rgba(47,128,237,.12);background:#fbfdff}
    button{height:42px;border:0;border-radius:12px;padding:0 15px;font:inherit;font-weight:700;cursor:pointer;display:inline-flex;align-items:center;justify-content:center;transition:transform .14s ease,box-shadow .14s ease,background .14s ease}
    button:hover{transform:translateY(-1px)}.btn-primary{background:linear-gradient(135deg,#2c6fca,#558fd7);color:#fff;box-shadow:0 10px 24px rgba(44,111,202,.26)}.btn-secondary{background:#dfeafb;color:#234f87}.btn-danger{background:#fff1ee;color:var(--danger)}.btn-ghost{background:#f8fbff;color:var(--text);border:1px solid var(--line)}
    .console{min-height:150px;max-height:280px;overflow:auto;white-space:pre-wrap;border-radius:16px;border:1px solid #88a9d1;background:#e8f0fb;color:#20476f;padding:14px;font-family:Consolas,monospace;font-size:12px;line-height:1.7}
    .app{min-height:100vh;display:grid;grid-template-columns:276px 1fr}.side{background:linear-gradient(180deg,#c8dcf7 0%,#8db1db 55%,#668fc4 100%);color:#123456;padding:24px 20px;display:flex;flex-direction:column;gap:18px;border-right:1px solid rgba(37,84,140,.18)}
    .brand h1{margin:12px 0 6px;font-size:28px}.brand p{margin:0;color:rgba(18,52,86,.72);font-size:14px;line-height:1.6}
    .nav{display:grid;gap:10px}
    .nav button{position:relative;text-align:left;background:rgba(255,255,255,.26);color:rgba(18,52,86,.88);border:1px solid rgba(255,255,255,.3);padding:15px 16px 15px 18px;border-radius:16px;height:auto;min-height:78px;display:flex;flex-direction:column;align-items:flex-start;justify-content:center;gap:8px;backdrop-filter:blur(8px);box-shadow:inset 0 1px 0 rgba(255,255,255,.24);transition:transform .16s ease,box-shadow .16s ease,border-color .16s ease,background .16s ease}
    .nav button::before{content:"";position:absolute;left:10px;top:14px;bottom:14px;width:4px;border-radius:999px;background:linear-gradient(180deg,rgba(47,128,237,0),rgba(47,128,237,.9),rgba(47,128,237,0));opacity:0;transform:scaleY(.7);transition:opacity .16s ease,transform .16s ease}
    .nav button:hover{background:rgba(255,255,255,.46);border-color:rgba(47,128,237,.18);box-shadow:0 12px 26px rgba(47,128,237,.12),inset 0 1px 0 rgba(255,255,255,.28)}
    .nav button:hover::before{opacity:.6;transform:scaleY(1)}
    .nav button.active{background:linear-gradient(180deg,rgba(255,255,255,.92) 0%,rgba(240,247,255,.92) 100%);color:#16385d;border-color:rgba(47,128,237,.24);box-shadow:0 16px 30px rgba(47,128,237,.14),inset 0 1px 0 rgba(255,255,255,.4)}
    .nav button.active::before{opacity:1;transform:scaleY(1)}
    .nav button span{display:block;width:100%;padding-left:12px;font-size:17px;font-weight:800;line-height:1.15;letter-spacing:.01em}
    .nav small{display:block;width:100%;margin-top:0;padding-left:12px;color:rgba(18,52,86,.62);font-size:12px;line-height:1.45}
    .side-note{padding:15px 16px;border-radius:16px;background:rgba(255,255,255,.54);border:1px solid rgba(47,128,237,.14);color:rgba(18,52,86,.78);font-size:13px;line-height:1.65}.mono{font-family:Consolas,monospace;font-size:12px;word-break:break-all}
    .main{padding:24px 24px 28px}.top{display:flex;align-items:flex-start;justify-content:space-between;gap:16px;margin-bottom:18px}.topbar{align-items:center;justify-content:flex-end}
    .lang-switch{padding:4px;border-radius:999px;background:#fff;border:1px solid var(--line)}.lang-switch button{padding:8px 12px;border-radius:999px;background:transparent;color:var(--muted)}.lang-switch button.active{background:var(--primary);color:#fff}
    .admin-chip{padding:10px 14px;border-radius:14px;background:#fff;border:1px solid var(--line);min-width:150px}.admin-chip strong{display:block;font-size:14px}.admin-chip span{display:block;color:var(--muted);font-size:12px}
    .badge{display:inline-flex;align-items:center;padding:7px 12px;border-radius:999px;font-size:12px;font-weight:700;text-transform:uppercase}.ok{background:rgba(31,143,106,.12);color:var(--ok)}.warn{background:rgba(192,138,24,.14);color:var(--warn)}.danger{background:rgba(199,90,74,.12);color:var(--danger)}.info{background:rgba(47,128,237,.12);color:var(--primary)}
    .metrics{display:grid;grid-template-columns:repeat(4,minmax(0,1fr));gap:14px;margin-bottom:18px}
    .metric,.item{padding:18px;border-radius:18px;background:linear-gradient(180deg,rgba(255,255,255,.98) 0%,rgba(247,251,255,.98) 100%);border:1px solid var(--line);display:flex;flex-direction:column;gap:12px;box-shadow:0 10px 24px rgba(47,128,237,.05)}
    .metric label{font-size:11px;text-transform:uppercase;letter-spacing:.08em}.metric strong{display:block;font-size:28px;line-height:1;margin:6px 0 0}.metric span,.item-meta,.desc,.hint{color:var(--muted);font-size:13px;line-height:1.6}
    .panel{display:none;padding:22px}.panel.active{display:block}
    .head{display:flex;align-items:flex-start;justify-content:space-between;gap:16px;margin-bottom:18px;padding-bottom:14px;border-bottom:1px solid rgba(16,31,56,.06)}.head h3{margin:0;font-size:22px}
    .grid2,.grid3,.table{display:grid;gap:14px;align-items:start}.grid2{grid-template-columns:repeat(2,minmax(0,1fr))}.grid3{grid-template-columns:repeat(3,minmax(0,1fr))}
    .hint{padding:14px 16px;border-radius:16px;background:var(--soft-2);border:1px dashed rgba(15,23,42,.14)}
    .item + .item{margin-top:12px}.item-head{display:flex;align-items:flex-start;justify-content:space-between;gap:16px;margin-bottom:2px}.item-title{font-weight:800;font-size:15px;line-height:1.35}
    .item-title,.metric label{position:relative}
    .item-title::before{content:"";display:inline-block;width:8px;height:8px;margin-right:8px;border-radius:999px;background:linear-gradient(135deg,#7ab2ff,#2f80ed);vertical-align:middle;box-shadow:0 0 0 4px rgba(47,128,237,.08)}
    .row{display:grid;grid-template-columns:1.2fr 1fr 1fr .9fr .8fr .9fr;gap:12px;padding:14px 16px;border-radius:16px;background:rgba(255,255,255,.9);border:1px solid var(--line);align-items:center;box-shadow:0 8px 18px rgba(47,128,237,.04)}.row.header{background:#eff6ff;color:var(--muted);font-size:12px;font-weight:700;text-transform:uppercase;box-shadow:none}
    .pager{display:flex;align-items:center;justify-content:space-between;gap:12px;margin-top:14px;padding:0 4px}.pager-meta{color:var(--muted);font-size:13px}.pager-actions{display:flex;gap:10px;flex-wrap:wrap}
    #tab-center .item,#tab-governance .item,#tab-system .item{box-shadow:0 1px 0 rgba(16,31,56,.02)}
    #tab-governance .grid3 > .item,#tab-center .grid2 > .item,#tab-system .grid2 > .item{min-height:100%}
    #tab-governance .item .grid3,#tab-governance .item .grid2,#tab-center .item .grid3,#tab-system .item .grid3{margin-top:0}
    #tab-governance #boundUsers .item,#tab-governance #blockedEmails .item,#tab-governance #invites .item{padding:14px 15px;border-radius:16px;background:var(--soft);border:1px solid rgba(16,31,56,.08)}
    #tab-governance .actions,#tab-center .actions,#tab-system .actions{padding-top:2px}
    .btn-danger{border:1px solid rgba(199,90,74,.18)}
    .btn-danger:hover{box-shadow:0 10px 20px rgba(199,90,74,.12)}
    #tab-system .item:first-child{border-color:rgba(47,128,237,.18)}
    #tab-system .item:last-child{border-color:rgba(47,128,237,.18)}
    .toast-stack{position:fixed;top:18px;right:18px;z-index:9999;display:grid;gap:10px;max-width:min(360px,calc(100vw - 36px))}.toast{padding:14px 16px;border-radius:16px;background:#2c5f96;color:#fff;box-shadow:0 16px 36px rgba(47,128,237,.22);border:1px solid rgba(255,255,255,.12);opacity:0;transform:translateY(-8px);transition:opacity .18s ease,transform .18s ease}.toast.show{opacity:1;transform:translateY(0)}.toast.success{background:#23785b}.toast.error{background:#b55246}.toast.info{background:#3a78c7}
    @media (max-width:1180px){.metrics{grid-template-columns:repeat(2,minmax(0,1fr))}.login-card,.app{grid-template-columns:1fr}} @media (max-width:760px){.shell,.main{padding:18px}.metrics,.grid2,.grid3{grid-template-columns:1fr}.top,.pager{flex-direction:column;align-items:flex-start}.row{grid-template-columns:1fr}}
  </style>
</head>
<body>
  <div id="toastStack" class="toast-stack"></div>
  <div id="setupGate" class="login shell hidden" style="position:fixed;inset:0;z-index:9998;background:rgba(15,27,48,.24);backdrop-filter:blur(8px);padding:24px">
    <div class="card" style="width:min(720px,100%);margin:auto;padding:28px">
      <div class="mini" data-gate="title"></div>
      <h2 id="setupGateHeading" style="margin:14px 0 8px"></h2>
      <p class="subtle" id="setupGateDesc"></p>
      <div id="setupGateList" class="stage-card" style="margin-top:18px"></div>
      <div class="actions" style="margin-top:18px">
        <button class="btn-primary" type="button" onclick="openSetupGateTarget()" id="setupGateAction"></button>
        <button class="btn-ghost" type="button" onclick="recheckSetupGate()" id="setupGateRefresh"></button>
      </div>
    </div>
  </div>
  <div id="loginView" class="login shell">
    <div class="login-card card">
      <div class="hero">
        <div class="mini">CodeClaw Hub</div>
        <h1 data-i18n="loginHeroTitle"></h1>
        <p data-i18n="loginHeroDesc"></p>
        <ul>
          <li data-i18n="loginBullet1"></li>
          <li data-i18n="loginBullet2"></li>
          <li data-i18n="loginBullet3"></li>
        </ul>
      </div>
      <div class="form">
        <div class="mini" data-i18n="adminAccess"></div>
        <h2 data-i18n="loginTitle"></h2>
        <p class="subtle" id="authStageHint"></p>
        <div id="stageToggle" class="stage-toggle hidden">
          <button id="setupStageButton" class="btn-secondary" type="button" onclick="showAuthStage('setup')" data-i18n="firstSetup"></button>
          <button id="loginStageButton" class="btn-ghost" type="button" onclick="showAuthStage('login')" data-i18n="adminLogin"></button>
        </div>
        <div id="setupStage" class="stage-card hidden">
          <h3 data-i18n="firstSetup"></h3>
          <p class="subtle" data-i18n="setupDesc"></p>
          <div>
            <label for="setupUsername" data-i18n="adminUsername"></label>
            <input id="setupUsername" placeholder="admin">
          </div>
          <div>
            <label for="setupEmail" data-i18n="adminEmail"></label>
            <input id="setupEmail" type="email" placeholder="admin@example.com">
          </div>
          <div>
            <label for="setupPassword" data-i18n="adminPassword"></label>
            <input id="setupPassword" type="password">
          </div>
          <div class="actions"><button class="btn-secondary" onclick="setupAdmin()" data-i18n="saveInit"></button></div>
        </div>
        <div id="loginStage" class="stage-card hidden">
          <h3 data-i18n="adminLogin"></h3>
          <p class="subtle" data-i18n="signinDesc"></p>
          <div>
            <label for="loginUsername" data-i18n="adminUsername"></label>
            <input id="loginUsername" placeholder="admin">
          </div>
          <div>
            <label for="loginPassword" data-i18n="adminPassword"></label>
            <input id="loginPassword" type="password">
          </div>
          <div class="actions"><button class="btn-primary" onclick="loginAdmin()" data-i18n="signIn"></button></div>
        </div>
        <div id="loginOutput" class="console"></div>
      </div>
    </div>
  </div>

  <div id="appView" class="app hidden">
    <aside class="side">
      <div class="brand">
        <div class="mini" style="background:rgba(255,255,255,.1);color:#fff">CodeClaw Hub</div>
        <h1 data-i18n="brandTitle"></h1>
        <p data-i18n="brandDesc"></p>
      </div>
      <nav class="nav">
        <button data-tab="overview" class="active" onclick="openTab('overview')"><span data-i18n="navOverview"></span><small data-i18n="navOverviewDesc"></small></button>
        <button data-tab="center" onclick="openTab('center')"><span data-i18n="navCenter"></span><small data-i18n="navCenterDesc"></small></button>
        <button data-tab="governance" onclick="openTab('governance')"><span data-i18n="navGovernance"></span><small data-i18n="navGovernanceDesc"></small></button>
        <button data-tab="system" onclick="openTab('system')"><span data-i18n="navSystem"></span><small data-i18n="navSystemDesc"></small></button>
        <button data-tab="machines" onclick="openTab('machines')"><span data-i18n="navMachines"></span><small data-i18n="navMachinesDesc"></small></button>
        <button data-tab="console" onclick="openTab('console')"><span data-i18n="navConsole"></span><small data-i18n="navConsoleDesc"></small></button>
      </nav>
      <div class="side-note"><span data-i18n="defaultCenter"></span><br><span class="mono">http://127.0.0.1:9388</span><br><br><span data-i18n="deployHint"></span></div>
    </aside>
    <main class="main">
      <div class="top">
        <div><h2 id="pageTitle"></h2><div class="subtle" id="pageSubtitle"></div></div>
        <div class="topbar">
          <div class="lang-switch">
            <button type="button" data-lang="en" onclick="setLanguage('en')">EN</button>
            <button type="button" data-lang="zh" onclick="setLanguage('zh')"></button>
          </div>
          <div class="admin-chip"><strong id="adminDisplayName"></strong><span id="adminDisplayMeta"></span></div>
          <span id="authBadge" class="badge ok"></span>
          <button class="btn-ghost" onclick="logoutAdmin()" data-i18n="logout"></button>
        </div>
      </div>
      <div class="metrics">
        <div class="metric"><label data-i18n="metricCenter"></label><strong id="centerStatusHero"></strong><span id="centerStatusHint"></span></div>
        <div class="metric"><label data-i18n="metricMachines"></label><strong id="machineCountHero">0</strong><span data-i18n="metricMachinesHint"></span></div>
        <div class="metric"><label data-i18n="metricBlocked"></label><strong id="blockedCountHero">0</strong><span data-i18n="metricBlockedHint"></span></div>
        <div class="metric"><label data-i18n="metricInvites"></label><strong id="inviteCountHero">0</strong><span data-i18n="metricInvitesHint"></span></div>
      </div>
      <section id="tab-overview" class="panel card active"><div class="head"><div><h3 data-i18n="overviewTitle"></h3><div class="desc" data-i18n="overviewDesc"></div></div><button class="btn-ghost" onclick="refreshAll()" data-i18n="refreshAll"></button></div><div class="grid2"><div class="hint" id="centerStatusDetail"></div><div class="item"><div class="item-title" data-i18n="endpointTitle"></div><div class="item-meta" data-i18n="endpointDesc"></div><div class="mono" id="centerAdvertisedURL" style="margin-top:8px;color:var(--text)"></div></div></div></section>
      <section id="tab-center" class="panel card"><div class="head"><div><h3 data-i18n="centerTitle"></h3><div class="desc" data-i18n="centerDesc"></div></div><button class="btn-ghost" onclick="loadCenterStatus()" data-i18n="refreshStatus"></button></div><div class="grid2"><div class="item"><div id="centerConfigForm"><label for="centerBaseURL" data-i18n="centerUrl"></label><input id="centerBaseURL" placeholder="http://127.0.0.1:9388"><label for="centerPublicBaseURL" style="margin-top:12px" data-i18n="publicHubUrl"></label><input id="centerPublicBaseURL" placeholder="https://hub.example.com"><label for="centerVisibility" style="margin-top:12px" data-i18n="visibilityMode"></label><select id="centerVisibility"><option value="private" data-i18n="visibilityPrivate"></option><option value="shared" data-i18n="visibilityShared"></option></select><label for="centerEnrollmentMode" style="margin-top:12px" data-i18n="enrollmentMode"></label><select id="centerEnrollmentMode"><option value="open" data-i18n="enrollmentOpen"></option><option value="approval" data-i18n="enrollmentApproval"></option><option value="manual" data-i18n="enrollmentManual"></option></select><div id="centerRegisterActions" class="actions"><button class="btn-secondary" onclick="saveCenterConfig()" data-i18n="saveAddress"></button><button id="registerNowButton" class="btn-primary" onclick="registerWithCenter()" data-i18n="registerNow"></button></div></div><div id="centerRegisteredNotice" class="hint hidden" style="margin-top:14px"><strong id="centerRegisteredTitle"></strong><div class="item-meta" id="centerRegisteredHint" style="margin-top:8px"></div></div></div><div class="item"><div class="item-title" data-i18n="registrationStatus"></div><div class="item-meta" id="centerStatusDetailTab"></div><div class="grid3" style="margin-top:14px"><div><label data-i18n="advertisedHost"></label><div class="mono" id="centerAdvertisedHost"></div></div><div><label data-i18n="advertisedPort"></label><div class="mono" id="centerAdvertisedPort"></div></div><div><label data-i18n="visibilityMode"></label><div class="mono" id="visibilityHero"></div></div></div><div class="grid2" style="margin-top:14px"><div><label data-i18n="enrollmentMode"></label><div class="mono" id="modeHero"></div></div><div><label data-i18n="publicHubUrl"></label><div class="mono" id="centerPublicBaseURLHero"></div></div></div></div></div></section>

    function renderCenterStatus(data) { centerStatusCache = data || {}; const registered = !!data.registered; const pending = !!data.pending_confirmation; const disabled = !!data.disabled; const detail = data.advertised_base_url ? tr('advertisedAs', { url: data.advertised_base_url }) : tr('noAdvertisedUrl'); const statusTitle = disabled ? ctr('disabled') : registered ? ctr('registeredOnline') : pending ? ctr('pending') : tr('notRegistered'); const statusHint = disabled ? ctr('disabledMetricHint') : registered ? ctr('registeredMetricHint') : pending ? ctr('pendingMetricHint') : tr('syncMissing'); document.getElementById('centerStatusHero').textContent = statusTitle; document.getElementById('centerStatusHint').textContent = statusHint; document.getElementById('centerStatusDetail').textContent = detail; document.getElementById('centerStatusDetailTab').textContent = detail; document.getElementById('centerAdvertisedURL').textContent = data.advertised_base_url || tr('notConfigured'); document.getElementById('centerAdvertisedHost').textContent = data.host || tr('na'); document.getElementById('centerAdvertisedPort').textContent = data.port ? String(data.port) : tr('na'); document.getElementById('visibilityHero').textContent = data.visibility === 'shared' ? tr('visibilityShared') : tr('visibilityPrivate'); document.getElementById('modeHero').textContent = data.enrollment_mode === 'approval' ? tr('enrollmentApproval') : data.enrollment_mode === 'manual' ? tr('enrollmentManual') : tr('enrollmentOpen'); document.getElementById('centerBaseURL').value = data.base_url || ''; document.getElementById('centerPublicBaseURL').value = data.public_base_url || ''; document.getElementById('centerPublicBaseURLHero').textContent = data.public_base_url || tr('notConfigured'); document.getElementById('centerVisibility').value = data.visibility === 'shared' ? 'shared' : 'private'; document.getElementById('centerEnrollmentMode').value = data.enrollment_mode || 'open'; document.getElementById('centerConfigForm').classList.toggle('hidden', registered || pending || disabled); document.getElementById('centerRegisteredNotice').classList.toggle('hidden', !(registered || pending || disabled)); document.getElementById('centerRegisteredTitle').textContent = disabled ? ctr('disabled') : registered ? ctr('registeredOnline') : ctr('pending'); document.getElementById('centerRegisteredHint').textContent = disabled ? ctr('disabledHint') : registered ? ctr('registeredOnlineHint') : ctr('pendingHint'); evaluateSetupGate(); }
    function renderBlockedEmails(items) { document.getElementById('blockedCountHero').textContent = String(items.length); const root = document.getElementById('blockedEmails'); if (!items.length) { root.innerHTML = '<div class="hint">' + tr('emptyBlocked') + '</div>'; return; } root.innerHTML = items.map(v => `<div class="item"><div class="item-head"><div class="item-title">${v.email}</div><span class="badge danger">${tr('addBlock')}</span></div><div class="item-meta">${v.reason || tr('noReason')}</div></div>`).join(''); }
    function renderInvites(items) { document.getElementById('inviteCountHero').textContent = String(items.length); const root = document.getElementById('invites'); if (!items.length) { root.innerHTML = '<div class="hint">' + tr('emptyInvites') + '</div>'; return; } root.innerHTML = items.map(v => `<div class="item"><div class="item-head"><div><div class="item-title">${v.email}</div><div class="item-meta">${tr('role')}: ${v.role || tr('roleViewer')}</div></div><span class="badge info">${v.status || tr('active')}</span></div></div>`).join(''); }
    function formatPlatformLabel(platform) { const value = String(platform || '').trim().toLowerCase(); if (!value) return tr('unknown'); if (value === 'windows') return 'Windows'; if (value === 'mac' || value === 'macos' || value === 'darwin') return 'macOS'; if (value === 'linux' || value === 'linxu') return 'Linux'; return value.charAt(0).toUpperCase() + value.slice(1); }
    function renderBoundUsers(items) { const root = document.getElementById('boundUsers'); if (!items.length) { root.innerHTML = '<div class="hint">' + tr('emptyBoundUsers') + '</div>'; return; } root.innerHTML = items.map(v => `<div class="item"><div class="item-head"><div><div class="item-title">${v.email}</div><div class="item-meta mono">${v.sn || tr('na')}</div></div><span class="badge info">${v.enrollment_status || v.status || tr('active')}</span></div></div>`).join(''); }
    function findMailPreset(provider) { return MAIL_PRESETS[provider] || MAIL_PRESETS.custom; }
    function detectMailProvider(cfg) { const host = String(cfg?.smtp_host || '').trim().toLowerCase(); const port = Number(cfg?.smtp_port || 0); const encryption = String(cfg?.smtp_encryption || '').trim().toLowerCase(); for (const [provider, preset] of Object.entries(MAIL_PRESETS)) { if (provider === 'custom') continue; if (host === preset.smtp_host && (!port || port === preset.smtp_port) && (!encryption || encryption === preset.smtp_encryption)) return provider; } return String(cfg?.provider || '').trim() || 'custom'; }
    function renderMailConfig(cfg = {}) { const provider = detectMailProvider(cfg); document.getElementById('mailProvider').value = MAIL_PRESETS[provider] ? provider : 'custom'; document.getElementById('mailHost').value = cfg.smtp_host || ''; document.getElementById('mailPort').value = cfg.smtp_port ? String(cfg.smtp_port) : ''; document.getElementById('mailEncryption').value = cfg.smtp_encryption || 'auto'; document.getElementById('mailUsername').value = cfg.smtp_username || ''; document.getElementById('mailPassword').value = cfg.smtp_password || ''; document.getElementById('mailFromName').value = cfg.from_name || 'CodeClaw Hub'; document.getElementById('mailFromEmail').value = cfg.from_email || cfg.smtp_username || ''; }
    function applyMailPreset() { const provider = document.getElementById('mailProvider').value; const preset = findMailPreset(provider); if (provider !== 'custom') { document.getElementById('mailHost').value = preset.smtp_host || ''; document.getElementById('mailPort').value = preset.smtp_port ? String(preset.smtp_port) : ''; document.getElementById('mailEncryption').value = preset.smtp_encryption || 'auto'; if (!document.getElementById('mailFromEmail').value.trim()) document.getElementById('mailFromEmail').value = document.getElementById('mailUsername').value.trim(); } }
    function collectMailConfig() { const host = document.getElementById('mailHost').value.trim(); const username = document.getElementById('mailUsername').value.trim(); const password = document.getElementById('mailPassword').value; const fromEmail = document.getElementById('mailFromEmail').value.trim(); const provider = document.getElementById('mailProvider').value || 'custom'; if (!host || !username || !password || !fromEmail) throw new Error('Please complete the SMTP host, account, password, and sender email first.'); const parsedPort = Number(document.getElementById('mailPort').value || 0); return { enabled: true, provider, smtp_host: host, smtp_port: parsedPort > 0 ? parsedPort : findMailPreset(provider).smtp_port || 587, smtp_encryption: document.getElementById('mailEncryption').value || 'auto', smtp_username: username, smtp_password: password, from_name: document.getElementById('mailFromName').value.trim() || 'CodeClaw Hub', from_email: fromEmail }; }
    async function loadMailConfig() { try { const data = await api('/api/admin/mail/config'); mailConfigCache = data || {}; renderMailConfig(mailConfigCache); evaluateSetupGate(); } catch (err) { const msg = tr('mailConfigLoadFailed', { error: err.message }); setOutput(msg); showToast(msg, 'error'); } }
    async function saveMailConfig(options = {}) { try { const payload = collectMailConfig(); const data = await api('/api/admin/mail/config', { method: 'POST', body: JSON.stringify(payload) }); mailConfigCache = data || payload; renderMailConfig(mailConfigCache); evaluateSetupGate(); if (!options.silentSuccess) { const msg = tr('mailConfigSaved'); setOutput(msg); showToast(msg, 'success'); } return data || payload; } catch (err) { const msg = tr('mailConfigSaveFailed', { error: err.message }); setOutput(msg); showToast(msg, 'error'); throw err; } }
    function renderMachineList(items) { machineItemsCache = Array.isArray(items) ? items : []; document.getElementById('machineCountHero').textContent = String(machineItemsCache.length); const root = document.getElementById('machines'); const pager = document.getElementById('machinesPager'); const pagerMeta = document.getElementById('machinesPagerMeta'); const prevButton = document.getElementById('machinesPrevButton'); const nextButton = document.getElementById('machinesNextButton'); const header = `<div class="row header"><div>${tr('machine')}</div><div>${ml('boundEmail')}</div><div>${ml('runtime')}</div><div>${ml('heartbeat')}</div><div>${tr('status')}</div><div>${tr('lastSeen')}</div></div>`; if (!machineItemsCache.length) { pager.classList.add('hidden'); root.innerHTML = header + '<div class="hint">' + tr('noMachinesLoaded') + '</div>'; return; } const totalPages = Math.max(1, Math.ceil(machineItemsCache.length / machinePageSize)); if (machinePage > totalPages) machinePage = totalPages; if (machinePage < 1) machinePage = 1; const startIndex = (machinePage - 1) * machinePageSize; const pageItems = machineItemsCache.slice(startIndex, startIndex + machinePageSize); root.innerHTML = header + pageItems.map(v => { const state = v.status === 'online' ? tr('online') : v.status === 'offline' ? tr('offline') : (v.status || tr('unknown')); const email = v.user_email || tr('na'); const runtime = [`${formatPlatformLabel(v.platform)}`, v.hostname ? `${ml('host')}: ${v.hostname}` : '', v.arch ? `${ml('arch')}: ${v.arch}` : '', v.app_version ? `${ml('version')}: ${v.app_version}` : ''].filter(Boolean); const heartbeat = [v.heartbeat_interval_sec ? `${ml('interval')}: ${v.heartbeat_interval_sec}s` : '', typeof v.active_sessions === 'number' ? `${ml('activeSessions')}: ${v.active_sessions}` : ''].filter(Boolean); return `<div class="row"><div><strong>${v.name || v.machine_id || tr('machine')}</strong><div class="item-meta mono">${v.machine_id || ''}</div></div><div><div>${email}</div><div class="item-meta mono">${v.user_id || ''}</div></div><div>${runtime.map(line => `<div class="item-meta">${line}</div>`).join('')}</div><div>${heartbeat.length ? heartbeat.map(line => `<div class="item-meta">${line}</div>`).join('') : `<div class="item-meta">${tr('na')}</div>`}</div><div><span class="badge ${(v.status === 'online' ? 'ok' : 'warn')}">${state}</span></div><div>${v.last_seen_at || tr('na')}</div></div>`; }).join(''); const start = startIndex + 1; const end = startIndex + pageItems.length; pagerMeta.textContent = totalPages > 1 ? ml('pageSummary').replace('{start}', String(start)).replace('{end}', String(end)).replace('{total}', String(machineItemsCache.length)) : ml('pageSingle').replace('{total}', String(machineItemsCache.length)); prevButton.disabled = machinePage <= 1; nextButton.disabled = machinePage >= totalPages; pager.classList.toggle('hidden', machineItemsCache.length <= machinePageSize); }
    function changeMachinesPage(step) { const totalPages = Math.max(1, Math.ceil(machineItemsCache.length / machinePageSize)); machinePage = Math.min(totalPages, Math.max(1, machinePage + step)); renderMachineList(machineItemsCache); }
    async function lookupScopedUser(email) { if (!email) return null; const data = await api(`/api/admin/users/lookup?email=${encodeURIComponent(email)}`); return data.user || null; }
    async function setupAdmin() { try { if (adminInitialized) { setSetupAvailability(false); showAuthStage('login'); document.getElementById('loginPassword').focus(); return; } const username = document.getElementById('setupUsername').value.trim(); const data = await api('/api/admin/setup', { method: 'POST', body: JSON.stringify({ username, email: document.getElementById('setupEmail').value.trim(), password: document.getElementById('setupPassword').value }) }); document.getElementById('loginUsername').value = username; document.getElementById('loginPassword').value = ''; adminInitialized = true; setSetupAvailability(false); setOutput(tr('setupDone', { message: data.message || tr('administrator') }), 'loginOutput'); showAuthStage('login'); document.getElementById('loginPassword').focus(); } catch (err) { setOutput(tr('setupFailed', { error: err.message }), 'loginOutput'); } }
    async function loginAdmin() { try { const data = await api('/api/admin/login', { method: 'POST', body: JSON.stringify({ username: document.getElementById('loginUsername').value.trim(), password: document.getElementById('loginPassword').value }) }); localStorage.setItem(adminTokenKey, data.access_token); localStorage.setItem(adminProfileKey, JSON.stringify(data.admin || {})); setAuthState(true); restoreTab(); await refreshAll(); evaluateSetupGate(); } catch (err) { setOutput(tr('loginFailed', { error: err.message }), 'loginOutput'); } }
    function logoutAdmin() { localStorage.removeItem(adminTokenKey); localStorage.removeItem(adminProfileKey); setAuthState(false); }
    async function manualBind() { try { const email = document.getElementById('bindEmail').value.trim(); const data = await api('/api/admin/users/manual-bind', { method: 'POST', body: JSON.stringify({ email }) }); const msg = tr('bindDone', { email: data.user?.email || email, sn: data.user?.sn || tr('na') }); setOutput(msg); showToast(msg, 'success'); await Promise.all([loadBoundUsers(), loadMachines()]); } catch (err) { const msg = tr('bindFailed', { error: err.message }); setOutput(msg); showToast(msg, 'error'); } }
    async function loadBoundUsers() { try { const data = await api('/api/admin/users'); renderBoundUsers(data.users || []); } catch (err) { setOutput(tr('bindFailed', { error: err.message })); } }
    async function addBlockedEmail() { try { await api('/api/admin/blocklist', { method: 'POST', body: JSON.stringify({ email: document.getElementById('blockedEmail').value.trim(), reason: document.getElementById('blockedReason').value.trim() }) }); setOutput(tr('blockedAdded')); await loadBlockedEmails(); } catch (err) { setOutput(tr('blockedAddFailed', { error: err.message })); } }
    async function loadBlockedEmails() { try { const data = await api('/api/admin/blocklist'); renderBlockedEmails(data.blocked_emails || []); } catch (err) { setOutput(tr('blockedLoadFailed', { error: err.message })); } }
    async function addInvite() { try { await api('/api/admin/invites', { method: 'POST', body: JSON.stringify({ email: document.getElementById('inviteEmail').value.trim(), role: document.getElementById('inviteRole').value }) }); setOutput(tr('inviteCreated')); await loadInvites(); } catch (err) { setOutput(tr('inviteAddFailed', { error: err.message })); } }
    async function loadInvites() { try { const data = await api('/api/admin/invites'); renderInvites(data.invites || []); } catch (err) { setOutput(tr('inviteLoadFailed', { error: err.message })); } }
    async function saveCenterConfig() { try { const data = await api('/api/admin/center/config', { method: 'POST', body: JSON.stringify({ base_url: document.getElementById('centerBaseURL').value.trim(), public_base_url: document.getElementById('centerPublicBaseURL').value.trim(), visibility: document.getElementById('centerVisibility').value, enrollment_mode: document.getElementById('centerEnrollmentMode').value }) }); renderCenterStatus(data); const msg = tr('centerSaved'); setOutput(msg); showToast(msg, 'success'); } catch (err) { const msg = tr('centerSaveFailed', { error: err.message }); setOutput(msg); showToast(msg, 'error'); } }
    async function registerWithCenter() { try { const data = await api('/api/admin/center/register', { method: 'POST', body: JSON.stringify({}) }); renderCenterStatus(data); const msg = data.pending_confirmation ? ctr('registerSubmitted') : tr('centerRegisteredMsg'); setOutput(msg); showToast(msg, 'success'); } catch (err) { const msg = tr('centerRegisterFailed', { error: err.message }); document.getElementById('centerStatusDetail').textContent = msg; document.getElementById('centerStatusDetailTab').textContent = msg; document.getElementById('centerRegisteredNotice').classList.add('hidden'); document.getElementById('centerRegisterActions').classList.remove('hidden'); setOutput(msg); showToast(msg, 'error'); } }
    async function loadCenterStatus() { try { const data = await api('/api/admin/center/status'); renderCenterStatus(data); } catch (err) { setOutput(tr('centerLoadFailed', { error: err.message })); } }
    async function loadMachines() { try { machinePage = 1; const scope = document.getElementById('bindEmail').value.trim(); let path = '/api/admin/debug/machines'; if (scope) { const user = await lookupScopedUser(scope); if (!user || !user.id) throw new Error(tr('noHubUser', { email: scope })); path = `/api/admin/debug/machines?user_id=${encodeURIComponent(user.id)}`; } const data = await api(path); renderMachineList(data.machines || []); } catch (err) { setOutput(tr('machinesLoadFailed', { error: err.message })); } }
    async function sendTestMail() { try { const email = document.getElementById('testMailEmail').value.trim(); if (!email) { const msg = currentLang === 'zh' ? '\u8bf7\u8f93\u5165\u6d4b\u8bd5\u6536\u4ef6\u4eba\u90ae\u7bb1\u3002' : 'Please enter a test recipient email.'; setOutput(msg); showToast(msg, 'error'); return; } await saveMailConfig({ silentSuccess: true }); const data = await api('/api/admin/mail/test', { method: 'POST', body: JSON.stringify({ email }) }); mailConfigCache = { ...(mailConfigCache || {}), tested: true, tested_at: Date.now() / 1000 }; evaluateSetupGate(); const msg = data.message || tr('mailSent'); setOutput(msg); showToast(msg, 'success'); } catch (err) { const msg = tr('mailFailed', { error: err.message }); setOutput(msg); showToast(msg, 'error'); } }
    async function changeAdminPassword() { const currentPassword = document.getElementById('currentPasswordInput').value; const newPassword = document.getElementById('newPasswordInput').value; const confirmPassword = document.getElementById('confirmPasswordInput').value; if (!currentPassword || !newPassword) { const msg = tr('requestFailed'); setOutput(msg); showToast(msg, 'error'); return; } if (newPassword !== confirmPassword) { const msg = ptr('mismatch'); setOutput(msg); showToast(msg, 'error'); return; } try { const data = await api('/api/admin/password', { method: 'POST', body: JSON.stringify({ current_password: currentPassword, new_password: newPassword }) }); if (data.access_token) localStorage.setItem(adminTokenKey, data.access_token); if (data.admin) localStorage.setItem(adminProfileKey, JSON.stringify(data.admin)); document.getElementById('currentPasswordInput').value = ''; document.getElementById('newPasswordInput').value = ''; document.getElementById('confirmPasswordInput').value = ''; refreshAdminHeader(); const msg = ptr('changed'); setOutput(msg); showToast(msg, 'success'); } catch (err) { setOutput(err.message); showToast(err.message, 'error'); } }
    async function updateAdminProfile() { const email = document.getElementById('adminEmailInput').value.trim(); if (!email) { const msg = prf('required'); setOutput(msg); showToast(msg, 'error'); return; } try { const data = await api('/api/admin/profile', { method: 'POST', body: JSON.stringify({ email }) }); if (data.access_token) localStorage.setItem(adminTokenKey, data.access_token); if (data.admin) localStorage.setItem(adminProfileKey, JSON.stringify(data.admin)); refreshAdminHeader(); evaluateSetupGate(); const msg = prf('saved'); setOutput(msg); showToast(msg, 'success'); } catch (err) { const msg = prf('failed').replace('{error}', err.message); setOutput(msg); showToast(msg, 'error'); } }
    async function refreshAll() { await Promise.all([loadCenterStatus(), loadBlockedEmails(), loadInvites(), loadBoundUsers(), loadMailConfig(), loadMachines()]); }
    applyI18n(); if (token()) { setAuthState(true); restoreTab(); refreshAll(); } else { setAuthState(false); refreshAuthStage(); }
  </script>
