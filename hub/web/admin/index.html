<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>MaClaw Hub Admin Console</title>
  <style>
    :root{--bg:#dfeafb;--panel:#fff;--soft:#ecf3ff;--soft-2:#e4edfb;--text:#18314f;--muted:#5f7692;--line:rgba(37,84,140,.18);--line-strong:rgba(37,84,140,.3);--primary:#2c6fca;--ok:#1f8f6a;--warn:#b98219;--danger:#bf5648;--shadow:0 18px 42px rgba(37,84,140,.16)}
    *{box-sizing:border-box} body{margin:0;background:linear-gradient(180deg,#eef5ff 0%,var(--bg) 100%);color:var(--text);font-family:"Segoe UI","PingFang SC","Microsoft YaHei",sans-serif}
    .hidden{display:none!important}.shell{padding:24px}.card{background:rgba(255,255,255,.97);border:1px solid rgba(16,31,56,.08);border-radius:22px;box-shadow:var(--shadow)}
    .login{min-height:100vh;display:flex;align-items:center;justify-content:center}.login-card{width:min(1080px,100%);display:grid;grid-template-columns:1.1fr .9fr;overflow:hidden}
    .hero{padding:36px;background:linear-gradient(165deg,#cfe0f8 0%,#88addc 58%,#4c79b8 100%);color:#123456}.hero h1{margin:16px 0 10px;font-size:34px}.hero p,.hero li{color:rgba(18,52,86,.78);line-height:1.7}
    .mini{display:inline-flex;align-items:center;padding:6px 12px;border-radius:999px;background:rgba(47,128,237,.12);color:var(--primary);font-size:12px;font-weight:700;text-transform:uppercase;letter-spacing:.08em}
    .form{padding:32px;display:flex;flex-direction:column;gap:16px;justify-content:center}.form h2{margin:0;font-size:28px}.subtle{color:var(--muted);line-height:1.6}
    .stage-toggle,.actions,.topbar,.lang-switch{display:flex;gap:10px;flex-wrap:wrap}.stage-toggle button{flex:1;min-width:160px}
    .actions{align-items:center;justify-content:flex-start}.actions button{min-width:126px}
    .stage-card{padding:20px;border:1px solid var(--line);border-radius:18px;background:var(--soft);display:grid;gap:14px}
    label{display:block;margin-bottom:8px;color:var(--muted);font-size:12px;font-weight:800;letter-spacing:.03em}
    input,select{width:100%;height:44px;padding:0 14px;border-radius:12px;border:1px solid var(--line);font:inherit;background:#fff;color:var(--text);transition:border-color .18s ease,box-shadow .18s ease,background .18s ease}
    input[type="checkbox"]{width:16px;height:16px;padding:0;border-radius:4px;flex-shrink:0;cursor:pointer}
    input:hover,select:hover{border-color:var(--line-strong)} input:focus,select:focus{outline:none;border-color:rgba(47,128,237,.45);box-shadow:0 0 0 4px rgba(47,128,237,.12);background:#fbfdff}
    button{height:42px;border:0;border-radius:12px;padding:0 15px;font:inherit;font-weight:700;cursor:pointer;display:inline-flex;align-items:center;justify-content:center;transition:transform .14s ease,box-shadow .14s ease,background .14s ease}
    button:hover{transform:translateY(-1px)}.btn-primary{background:linear-gradient(135deg,#2c6fca,#558fd7);color:#fff;box-shadow:0 10px 24px rgba(44,111,202,.26)}.btn-secondary{background:#dfeafb;color:#234f87}.btn-danger{background:#fff1ee;color:var(--danger)}.btn-ghost{background:#f8fbff;color:var(--text);border:1px solid var(--line)}
    .console{min-height:150px;max-height:280px;overflow:auto;white-space:pre-wrap;border-radius:16px;border:1px solid #88a9d1;background:#e8f0fb;color:#20476f;padding:14px;font-family:Consolas,monospace;font-size:12px;line-height:1.7}
    .app{min-height:100vh;display:grid;grid-template-columns:276px 1fr}.side{background:linear-gradient(180deg,#c8dcf7 0%,#8db1db 55%,#668fc4 100%);color:#123456;padding:24px 20px;display:flex;flex-direction:column;gap:18px;border-right:1px solid rgba(37,84,140,.18)}
    .brand h1{margin:12px 0 6px;font-size:28px}.brand p{margin:0;color:rgba(18,52,86,.72);font-size:14px;line-height:1.6}
    .nav{display:grid;gap:10px}
    .nav button{position:relative;text-align:left;background:rgba(255,255,255,.26);color:rgba(18,52,86,.88);border:1px solid rgba(255,255,255,.3);padding:15px 16px 15px 18px;border-radius:16px;height:auto;min-height:78px;display:flex;flex-direction:column;align-items:flex-start;justify-content:center;gap:8px;backdrop-filter:blur(8px);box-shadow:inset 0 1px 0 rgba(255,255,255,.24);transition:transform .16s ease,box-shadow .16s ease,border-color .16s ease,background .16s ease}
    .nav button::before{content:"";position:absolute;left:10px;top:14px;bottom:14px;width:4px;border-radius:999px;background:linear-gradient(180deg,rgba(47,128,237,0),rgba(47,128,237,.9),rgba(47,128,237,0));opacity:0;transform:scaleY(.7);transition:opacity .16s ease,transform .16s ease}
    .nav button:hover{background:rgba(255,255,255,.46);border-color:rgba(47,128,237,.18);box-shadow:0 12px 26px rgba(47,128,237,.12),inset 0 1px 0 rgba(255,255,255,.28)}
    .nav button:hover::before{opacity:.6;transform:scaleY(1)}
    .nav button.active{background:linear-gradient(180deg,rgba(255,255,255,.92) 0%,rgba(240,247,255,.92) 100%);color:#16385d;border-color:rgba(47,128,237,.24);box-shadow:0 16px 30px rgba(47,128,237,.14),inset 0 1px 0 rgba(255,255,255,.4)}
    .nav button.active::before{opacity:1;transform:scaleY(1)}
    .nav button span{display:block;width:100%;padding-left:12px;font-size:17px;font-weight:800;line-height:1.15;letter-spacing:.01em}
    .nav small{display:block;width:100%;margin-top:0;padding-left:12px;color:rgba(18,52,86,.62);font-size:12px;line-height:1.45}
    .side-note{padding:15px 16px;border-radius:16px;background:rgba(255,255,255,.54);border:1px solid rgba(47,128,237,.14);color:rgba(18,52,86,.78);font-size:13px;line-height:1.65}.mono{font-family:Consolas,monospace;font-size:12px;word-break:break-all}
    .main{padding:24px 24px 28px}.top{display:flex;align-items:flex-start;justify-content:space-between;gap:16px;margin-bottom:18px}.topbar{align-items:center;justify-content:flex-end}
    .lang-switch{padding:4px;border-radius:999px;background:#fff;border:1px solid var(--line)}.lang-switch button{padding:8px 12px;border-radius:999px;background:transparent;color:var(--muted)}.lang-switch button.active{background:var(--primary);color:#fff}
    .admin-chip{padding:10px 14px;border-radius:14px;background:#fff;border:1px solid var(--line);min-width:150px}.admin-chip strong{display:block;font-size:14px}.admin-chip span{display:block;color:var(--muted);font-size:12px}
    .badge{display:inline-flex;align-items:center;padding:7px 12px;border-radius:999px;font-size:12px;font-weight:700;text-transform:uppercase}.ok{background:rgba(31,143,106,.12);color:var(--ok)}.warn{background:rgba(192,138,24,.14);color:var(--warn)}.danger{background:rgba(199,90,74,.12);color:var(--danger)}.info{background:rgba(47,128,237,.12);color:var(--primary)}
    .metrics{display:grid;grid-template-columns:repeat(4,minmax(0,1fr));gap:14px;margin-bottom:18px}
    .metric,.item{padding:18px;border-radius:18px;background:linear-gradient(180deg,rgba(255,255,255,.98) 0%,rgba(247,251,255,.98) 100%);border:1px solid var(--line);display:flex;flex-direction:column;gap:12px;box-shadow:0 10px 24px rgba(47,128,237,.05)}
    .metric label{font-size:11px;text-transform:uppercase;letter-spacing:.08em}.metric strong{display:block;font-size:28px;line-height:1;margin:6px 0 0}.metric span,.item-meta,.desc,.hint{color:var(--muted);font-size:13px;line-height:1.6}
    .panel{display:none;padding:22px}.panel.active{display:block}
    .head{display:flex;align-items:flex-start;justify-content:space-between;gap:16px;margin-bottom:18px;padding-bottom:14px;border-bottom:1px solid rgba(16,31,56,.06)}.head h3{margin:0;font-size:22px}
    .grid2,.grid3,.table{display:grid;gap:14px;align-items:start}.grid2{grid-template-columns:repeat(2,minmax(0,1fr))}.grid3{grid-template-columns:repeat(3,minmax(0,1fr))}
    .hint{padding:14px 16px;border-radius:16px;background:var(--soft-2);border:1px dashed rgba(15,23,42,.14)}
    .item + .item{margin-top:12px}.item-head{display:flex;align-items:flex-start;justify-content:space-between;gap:16px;margin-bottom:2px}.item-title{font-weight:800;font-size:15px;line-height:1.35}
    .item-title,.metric label{position:relative}
    .item-title::before{content:"";display:inline-block;width:8px;height:8px;margin-right:8px;border-radius:999px;background:linear-gradient(135deg,#7ab2ff,#2f80ed);vertical-align:middle;box-shadow:0 0 0 4px rgba(47,128,237,.08)}
    .row{display:grid;grid-template-columns:1.2fr 1fr 1fr .9fr .8fr .9fr .8fr;gap:12px;padding:14px 16px;border-radius:16px;background:rgba(255,255,255,.9);border:1px solid var(--line);align-items:center;box-shadow:0 8px 18px rgba(47,128,237,.04)}.row.header{background:#eff6ff;color:var(--muted);font-size:12px;font-weight:700;text-transform:uppercase;box-shadow:none}
    .pager{display:flex;align-items:center;justify-content:space-between;gap:12px;margin-top:14px;padding:0 4px}.pager-meta{color:var(--muted);font-size:13px}.pager-actions{display:flex;gap:10px;flex-wrap:wrap}
    #tab-center .item,#tab-governance .item,#tab-system .item{box-shadow:0 1px 0 rgba(16,31,56,.02)}
    #tab-governance .grid3 > .item,#tab-center .grid2 > .item,#tab-system .grid2 > .item{min-height:100%}
    #tab-governance .item .grid3,#tab-governance .item .grid2,#tab-center .item .grid3,#tab-system .item .grid3{margin-top:0}
    #tab-governance #boundUsers .item,#tab-governance #blockedEmails .item,#tab-governance #invites .item{padding:14px 15px;border-radius:16px;background:var(--soft);border:1px solid rgba(16,31,56,.08)}
    #tab-governance .actions,#tab-center .actions,#tab-system .actions{padding-top:2px}
    .btn-danger{border:1px solid rgba(199,90,74,.18)}
    .btn-danger:hover{box-shadow:0 10px 20px rgba(199,90,74,.12)}
    #tab-system .item:first-child{border-color:rgba(47,128,237,.18)}
    #tab-system .item:last-child{border-color:rgba(47,128,237,.18)}
    .toast-stack{position:fixed;top:18px;right:18px;z-index:9999;display:grid;gap:10px;max-width:min(360px,calc(100vw - 36px))}.toast{padding:14px 16px;border-radius:16px;background:#2c5f96;color:#fff;box-shadow:0 16px 36px rgba(47,128,237,.22);border:1px solid rgba(255,255,255,.12);opacity:0;transform:translateY(-8px);transition:opacity .18s ease,transform .18s ease}.toast.show{opacity:1;transform:translateY(0)}.toast.success{background:#23785b}.toast.error{background:#b55246}.toast.info{background:#3a78c7}
    .im-layout{display:grid;grid-template-rows:auto 1fr;gap:0;min-height:400px;margin-top:14px;border:1px solid var(--line);border-radius:18px;overflow:hidden;background:var(--panel)}
    .im-sidebar{background:linear-gradient(90deg,#f4f8ff 0%,#e8f0fb 100%);border-bottom:1px solid var(--line);padding:0 12px;display:flex;gap:4px;overflow-x:auto}
    .im-sidebar button{text-align:center;background:transparent;color:var(--text);border:none;padding:14px 22px;font:inherit;font-size:14px;font-weight:600;cursor:pointer;border-bottom:3px solid transparent;white-space:nowrap;transition:background .14s ease,border-color .14s ease}
    .im-sidebar button:hover{background:rgba(47,128,237,.06);transform:none;box-shadow:none}
    .im-sidebar button.active{background:rgba(255,255,255,.9);border-bottom-color:var(--primary);color:var(--primary)}
    .im-sidebar button small{display:block;margin-top:4px;font-size:11px;font-weight:400;color:var(--muted)}
    .im-content{padding:20px;overflow-y:auto}
    .im-pane{display:none}.im-pane.active{display:block}
    @media (max-width:1180px){.metrics{grid-template-columns:repeat(2,minmax(0,1fr))}.login-card,.app{grid-template-columns:1fr}.im-sidebar button{padding:10px 14px}} @media (max-width:760px){.shell,.main{padding:18px}.metrics,.grid2,.grid3{grid-template-columns:1fr}.top,.pager{flex-direction:column;align-items:flex-start}.row{grid-template-columns:1fr}}
    .session-modal-overlay{display:none;position:fixed;top:0;left:0;right:0;bottom:0;background:rgba(0,0,0,.35);z-index:9990;align-items:center;justify-content:center}.session-modal-overlay.show{display:flex}
    .session-modal{width:min(720px,calc(100% - 48px));max-height:80vh;overflow:auto;background:#fff;border-radius:22px;box-shadow:0 24px 60px rgba(37,84,140,.22);padding:24px;position:relative}
    .session-modal h3{margin:0 0 16px;font-size:20px}.session-modal .close-btn{position:absolute;top:14px;right:16px;background:none;border:none;font-size:22px;color:var(--muted);cursor:pointer;height:auto;padding:0;line-height:1}
    .session-item{padding:14px 16px;border-radius:14px;background:var(--soft);border:1px solid rgba(16,31,56,.08);margin-bottom:10px}
    .session-item .session-field{display:flex;gap:8px;align-items:baseline;margin-bottom:4px}.session-item .session-label{color:var(--muted);font-size:12px;font-weight:700;min-width:90px;flex-shrink:0}.session-item .session-value{font-size:13px;word-break:break-all}
  </style>
</head>
<body>
  <div id="toastStack" class="toast-stack"></div>
  <div id="sessionModalOverlay" class="session-modal-overlay" onclick="if(event.target===this)closeSessionModal()">
    <div class="session-modal">
      <button class="close-btn" onclick="closeSessionModal()" aria-label="Close">&times;</button>
      <h3 id="sessionModalTitle"></h3>
      <div id="sessionModalContent"></div>
    </div>
  </div>
  <div id="setupGate" class="hidden" style="position:fixed;top:16px;right:16px;z-index:9998;width:min(480px,calc(100% - 32px))">
    <div class="card" style="padding:20px;position:relative">
      <button type="button" onclick="dismissSetupGate()" style="position:absolute;top:12px;right:14px;background:none;border:none;font-size:20px;color:var(--muted);cursor:pointer;height:auto;padding:0;line-height:1" aria-label="Close">&times;</button>
      <div class="mini" data-gate="title"></div>
      <h2 id="setupGateHeading" style="margin:10px 0 6px;font-size:18px"></h2>
      <p class="subtle" id="setupGateDesc" style="font-size:13px"></p>
      <div id="setupGateList" class="stage-card" style="margin-top:12px"></div>
      <div class="actions" style="margin-top:14px">
        <button class="btn-primary" type="button" onclick="openSetupGateTarget()" id="setupGateAction" style="height:36px;font-size:13px"></button>
        <button class="btn-ghost" type="button" onclick="recheckSetupGate()" id="setupGateRefresh" style="height:36px;font-size:13px"></button>
      </div>
    </div>
  </div>
  <div id="loginView" class="login shell">
    <div class="login-card card">
      <div class="hero">
        <div class="mini">MaClaw Hub</div>
        <h1 data-i18n="loginHeroTitle"></h1>
        <p data-i18n="loginHeroDesc"></p>
        <ul>
          <li data-i18n="loginBullet1"></li>
          <li data-i18n="loginBullet2"></li>
          <li data-i18n="loginBullet3"></li>
        </ul>
      </div>
      <div class="form">
        <div class="mini" data-i18n="adminAccess"></div>
        <h2 data-i18n="loginTitle"></h2>
        <p class="subtle" id="authStageHint"></p>
        <div id="stageToggle" class="stage-toggle hidden">
          <button id="setupStageButton" class="btn-secondary" type="button" onclick="showAuthStage('setup')" data-i18n="firstSetup"></button>
          <button id="loginStageButton" class="btn-ghost" type="button" onclick="showAuthStage('login')" data-i18n="adminLogin"></button>
        </div>
        <div id="setupStage" class="stage-card hidden">
          <h3 data-i18n="firstSetup"></h3>
          <p class="subtle" data-i18n="setupDesc"></p>
          <div>
            <label for="setupUsername" data-i18n="adminUsername"></label>
            <input id="setupUsername" placeholder="admin">
          </div>
          <div>
            <label for="setupEmail" data-i18n="adminEmail"></label>
            <input id="setupEmail" type="email" placeholder="admin@example.com">
          </div>
          <div>
            <label for="setupPassword" data-i18n="adminPassword"></label>
            <input id="setupPassword" type="password">
          </div>
          <div class="actions"><button class="btn-secondary" onclick="setupAdmin()" data-i18n="saveInit"></button></div>
        </div>
        <div id="loginStage" class="stage-card hidden">
          <h3 data-i18n="adminLogin"></h3>
          <p class="subtle" data-i18n="signinDesc"></p>
          <div>
            <label for="loginUsername" data-i18n="adminUsername"></label>
            <input id="loginUsername" placeholder="admin">
          </div>
          <div>
            <label for="loginPassword" data-i18n="adminPassword"></label>
            <input id="loginPassword" type="password">
          </div>
          <div class="actions"><button class="btn-primary" onclick="loginAdmin()" data-i18n="signIn"></button></div>
        </div>
        <div id="loginOutput" class="console"></div>
      </div>
    </div>
  </div>

  <div id="appView" class="app hidden">
    <aside class="side">
      <div class="brand">
        <div class="mini" style="background:rgba(255,255,255,.1);color:#fff">MaClaw Hub</div>
        <h1 data-i18n="brandTitle"></h1>
        <p data-i18n="brandDesc"></p>
      </div>
      <nav class="nav">
        <button data-tab="overview" class="active" onclick="openTab('overview')"><span data-i18n="navOverview"></span><small data-i18n="navOverviewDesc"></small></button>
        <button data-tab="center" onclick="openTab('center')"><span data-i18n="navCenter"></span><small data-i18n="navCenterDesc"></small></button>
        <button data-tab="governance" onclick="openTab('governance')"><span data-i18n="navGovernance"></span><small data-i18n="navGovernanceDesc"></small></button>
        <button data-tab="system" onclick="openTab('system')"><span data-i18n="navSystem"></span><small data-i18n="navSystemDesc"></small></button>
        <button data-tab="im" onclick="openTab('im')"><span id="navIM"></span><small id="navIMDesc"></small></button>
        <button data-tab="machines" onclick="openTab('machines')"><span data-i18n="navMachines"></span><small data-i18n="navMachinesDesc"></small></button>
        <button data-tab="invitationcodes" onclick="openTab('invitationcodes')"><span id="navInvitationCodes"></span><small id="navInvitationCodesDesc"></small></button>
        <button data-tab="pwarequests" onclick="openTab('pwarequests')"><span id="navPwaRequests"></span><small id="navPwaRequestsDesc"></small></button>
        <button data-tab="console" onclick="openTab('console')"><span data-i18n="navConsole"></span><small data-i18n="navConsoleDesc"></small></button>
      </nav>
      <div class="side-note"><span data-i18n="defaultCenter"></span><br><span class="mono">http://hubs.mypapers.top:9388</span><br><br><span data-i18n="deployHint"></span></div>
    </aside>
    <main class="main">
      <div class="top">
        <div><h2 id="pageTitle"></h2><div class="subtle" id="pageSubtitle"></div></div>
        <div class="topbar">
          <div class="lang-switch">
            <button type="button" data-lang="en" onclick="setLanguage('en')">EN</button>
            <button type="button" data-lang="zh" onclick="setLanguage('zh')"></button>
          </div>
          <div class="admin-chip"><strong id="adminDisplayName"></strong><span id="adminDisplayMeta"></span></div>
          <span id="authBadge" class="badge ok"></span>
          <button class="btn-ghost" onclick="logoutAdmin()" data-i18n="logout"></button>
        </div>
      </div>
      <div class="metrics">
        <div class="metric"><label data-i18n="metricCenter"></label><strong id="centerStatusHero"></strong><span id="centerStatusHint"></span></div>
        <div class="metric"><label data-i18n="metricMachines"></label><strong id="machineCountHero">0</strong><span data-i18n="metricMachinesHint"></span></div>
        <div class="metric"><label data-i18n="metricBlocked"></label><strong id="blockedCountHero">0</strong><span data-i18n="metricBlockedHint"></span></div>
        <div class="metric"><label data-i18n="metricInvites"></label><strong id="inviteCountHero">0</strong><span data-i18n="metricInvitesHint"></span></div>
      </div>
      <section id="tab-overview" class="panel card active"><div class="head"><div><h3 data-i18n="overviewTitle"></h3><div class="desc" data-i18n="overviewDesc"></div></div><button class="btn-ghost" onclick="refreshAll()" data-i18n="refreshAll"></button></div><div class="grid2"><div class="hint" id="centerStatusDetail"></div><div class="item"><div class="item-title" data-i18n="endpointTitle"></div><div class="item-meta" data-i18n="endpointDesc"></div><div class="mono" id="centerAdvertisedURL" style="margin-top:8px;color:var(--text)"></div></div></div></section>

    function renderPwaEnrollments() { const root = document.getElementById('pwaEnrollmentList'); if (!root) return; if (!pwaEnrollmentsCache.length) { root.innerHTML = '<div class="hint">' + pwa('emptyList') + '</div>'; return; } root.innerHTML = pwaEnrollmentsCache.map(e => { const isPending = e.status === 'pending'; const badgeClass = isPending ? 'warn' : e.status === 'approved' ? 'ok' : 'danger'; const statusLabel = isPending ? pwa('statusPending') : e.status === 'approved' ? pwa('statusApproved') : pwa('statusRejected'); const actions = isPending ? `<div style="display:flex;gap:8px"><button class="btn-primary" style="height:34px;font-size:13px;padding:0 14px" onclick="approvePwaEnrollment('${e.id}','${e.email.replace(/'/g, "\\'")}')">${pwa('approve')}</button><button class="btn-danger" style="height:34px;font-size:13px;padding:0 14px" onclick="rejectPwaEnrollment('${e.id}','${e.email.replace(/'/g, "\\'")}')">${pwa('reject')}</button></div>` : ''; return `<div class="item" style="margin-bottom:12px"><div class="item-head"><div><div class="item-title">${e.email}</div><div class="item-meta">${pwa('note')}: ${e.note || '-'}</div><div class="item-meta">${pwa('createdAt')}: ${e.created_at || '-'}</div></div><div style="display:flex;gap:8px;align-items:center"><span class="badge ${badgeClass}">${statusLabel}</span>${actions}</div></div></div>`; }).join(''); }
    async function approvePwaEnrollment(id, email) { if (!confirm(pwa('approveConfirm', { email }))) return; try { const data = await api('/api/admin/enrollments/approve', { method: 'POST', body: JSON.stringify({ id }) }); const msg = pwa('approveSuccess', { email, sn: data.user?.sn || '-' }); setOutput(msg); showToast(msg, 'success'); await loadPwaEnrollments(); } catch (err) { const msg = pwa('approveFailed', { error: err.message }); setOutput(msg); showToast(msg, 'error'); } }
    async function rejectPwaEnrollment(id, email) { if (!confirm(pwa('rejectConfirm', { email }))) return; try { await api('/api/admin/enrollments/reject', { method: 'POST', body: JSON.stringify({ id }) }); const msg = pwa('rejectSuccess'); setOutput(msg); showToast(msg, 'success'); await loadPwaEnrollments(); } catch (err) { const msg = pwa('rejectFailed', { error: err.message }); setOutput(msg); showToast(msg, 'error'); } }
    async function manualApprovePwaEmail() { const email = document.getElementById('pwaManualEmail').value.trim(); if (!email) return; try { const data = await api('/api/admin/users/manual-bind', { method: 'POST', body: JSON.stringify({ email }) }); const msg = pwa('manualApproveSuccess', { email, sn: data.user?.sn || '-' }); setOutput(msg); showToast(msg, 'success'); document.getElementById('pwaManualEmail').value = ''; await Promise.all([loadPwaEnrollments(), loadPendingLogins()]); } catch (err) { const msg = pwa('manualApproveFailed', { error: err.message }); setOutput(msg); showToast(msg, 'error'); } }
    async function loadFeishuConfig() { try { const data = await api('/api/admin/feishu/config'); document.getElementById('feishuEnabled').checked = !!data.enabled; document.getElementById('feishuAppId').value = data.app_id || ''; document.getElementById('feishuAppSecret').value = data.app_secret || ''; loadFeishuBindings(); } catch (err) { const msg = fsh('loadFailed', { error: err.message }); setOutput(msg); showToast(msg, 'error'); } }
    async function saveFeishuConfig() { try { const payload = { enabled: document.getElementById('feishuEnabled').checked, app_id: document.getElementById('feishuAppId').value.trim(), app_secret: document.getElementById('feishuAppSecret').value }; const data = await api('/api/admin/feishu/config', { method: 'POST', body: JSON.stringify(payload) }); document.getElementById('feishuEnabled').checked = !!data.enabled; document.getElementById('feishuAppId').value = data.app_id || ''; document.getElementById('feishuAppSecret').value = data.app_secret || ''; const msg = fsh('saved'); setOutput(msg); showToast(msg, 'success'); } catch (err) { const msg = fsh('saveFailed', { error: err.message }); setOutput(msg); showToast(msg, 'error'); } }
    async function loadFeishuBindings() { try { const data = await api('/api/admin/feishu/bindings'); const bindings = data.bindings || []; const root = document.getElementById('feishuBindingsList'); if (!root) return; if (!bindings.length) { root.innerHTML = '<div class="hint">' + fsh('noBindings') + '</div>'; return; } root.innerHTML = bindings.map(b => `<div class="item" style="margin-bottom:8px"><div class="item-head"><div><div class="item-title">${b.email}</div><div class="item-meta mono">${b.open_id}</div></div><button class="btn-danger" style="height:32px;font-size:12px;padding:0 10px" onclick="unbindFeishu('${b.email.replace(/'/g, "\\'")}')">${fsh('unbind')}</button></div></div>`).join(''); } catch (err) { const msg = fsh('bindingsLoadFailed', { error: err.message }); setOutput(msg); } }
    async function unbindFeishu(email) { if (!confirm(fsh('unbindConfirm', { email }))) return; try { await api('/api/admin/feishu/bindings?email=' + encodeURIComponent(email), { method: 'DELETE' }); const msg = fsh('unbindSuccess'); setOutput(msg); showToast(msg, 'success'); loadFeishuBindings(); } catch (err) { const msg = fsh('unbindFailed', { error: err.message }); setOutput(msg); showToast(msg, 'error'); } }
    async function loadOpenclawImConfig() { try { const data = await api('/api/admin/settings/openclaw_im'); document.getElementById('openclawImEnabled').checked = !!data.enabled; document.getElementById('openclawImWebhookUrl').value = data.webhook_url || ''; document.getElementById('openclawImSecret').value = data.secret || ''; } catch (err) { const msg = ocim('loadFailed', { error: err.message }); setOutput(msg); showToast(msg, 'error'); } }
    async function saveOpenclawImConfig() { try { const payload = { enabled: document.getElementById('openclawImEnabled').checked, webhook_url: document.getElementById('openclawImWebhookUrl').value.trim(), secret: document.getElementById('openclawImSecret').value }; const data = await api('/api/admin/settings/openclaw_im', { method: 'POST', body: JSON.stringify(payload) }); document.getElementById('openclawImEnabled').checked = !!data.enabled; document.getElementById('openclawImWebhookUrl').value = data.webhook_url || ''; document.getElementById('openclawImSecret').value = data.secret || ''; const msg = ocim('saved'); setOutput(msg); showToast(msg, 'success'); } catch (err) { const msg = ocim('saveFailed', { error: err.message }); setOutput(msg); showToast(msg, 'error'); } }
    async function testOpenclawImWebhook() { const btn = document.getElementById('openclawImTestBtn'); if (btn) { btn.disabled = true; btn.textContent = ocim('testing'); } try { await saveOpenclawImConfig(); const data = await api('/api/admin/settings/openclaw_im/test', { method: 'POST' }); if (data.ok) { const msg = ocim('testSuccess', { status: String(data.status) }); setOutput(msg); showToast(msg, 'success'); } else { const msg = ocim('testFailed', { message: data.message || 'Unknown error' }); setOutput(msg); showToast(msg, 'error'); } } catch (err) { const msg = ocim('testFailed', { message: err.message }); setOutput(msg); showToast(msg, 'error'); } finally { if (btn) { btn.disabled = false; btn.textContent = ocim('testWebhook'); } } }
    async function loadQQBotConfig() { try { const data = await api('/api/admin/settings/qqbot'); document.getElementById('qqbotEnabled').checked = !!data.enabled; document.getElementById('qqbotAppId').value = data.app_id || ''; document.getElementById('qqbotAppSecret').value = data.app_secret || ''; loadQQBotBindings(); } catch (err) { const msg = qqb('loadFailed', { error: err.message }); setOutput(msg); showToast(msg, 'error'); } }
    async function saveQQBotConfig() { try { const payload = { enabled: document.getElementById('qqbotEnabled').checked, app_id: document.getElementById('qqbotAppId').value.trim(), app_secret: document.getElementById('qqbotAppSecret').value }; const data = await api('/api/admin/settings/qqbot', { method: 'POST', body: JSON.stringify(payload) }); document.getElementById('qqbotEnabled').checked = !!data.enabled; document.getElementById('qqbotAppId').value = data.app_id || ''; document.getElementById('qqbotAppSecret').value = data.app_secret || ''; const msg = qqb('saved'); setOutput(msg); showToast(msg, 'success'); } catch (err) { const msg = qqb('saveFailed', { error: err.message }); setOutput(msg); showToast(msg, 'error'); } }
    async function loadQQBotBindings() { try { const data = await api('/api/admin/qqbot/bindings'); const bindings = data.bindings || []; const root = document.getElementById('qqbotBindingsList'); if (!root) return; if (!bindings.length) { root.innerHTML = '<div class="hint">' + qqb('noBindings') + '</div>'; return; } root.innerHTML = bindings.map(b => `<div class="item" style="margin-bottom:8px"><div class="item-head"><div><div class="item-title">${b.email}</div><div class="item-meta mono">${b.open_id}</div></div><button class="btn-danger" style="height:32px;font-size:12px;padding:0 10px" onclick="unbindQQBot('${b.open_id.replace(/'/g, "\\'")}')">${qqb('unbind')}</button></div></div>`).join(''); } catch (err) { const msg = qqb('bindingsLoadFailed', { error: err.message }); setOutput(msg); } }
    async function unbindQQBot(openId) { if (!confirm(qqb('unbindConfirm', { email: openId }))) return; try { await api('/api/admin/qqbot/bindings?open_id=' + encodeURIComponent(openId), { method: 'DELETE' }); const msg = qqb('unbindSuccess'); setOutput(msg); showToast(msg, 'success'); loadQQBotBindings(); } catch (err) { const msg = qqb('unbindFailed', { error: err.message }); setOutput(msg); showToast(msg, 'error'); } }
    async function refreshAll() { await Promise.all([loadCenterStatus(), loadBlockedEmails(), loadInvites(), loadBoundUsers(), loadMailConfig(), loadFeishuConfig(), loadMachines(), loadPwaEnrollments(), loadPendingLogins()]); }
    applyI18n(); if (token()) { setAuthState(true); restoreTab(); refreshAll(); } else { setAuthState(false); refreshAuthStage(); }
  </script>
