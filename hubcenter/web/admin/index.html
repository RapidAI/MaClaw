<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>MaClaw Hub Center Admin</title>
  <style>
    :root{--bg:#dfeafb;--panel:#fff;--soft:#ecf3ff;--soft-2:#e4edfb;--text:#18314f;--muted:#5f7692;--line:rgba(37,84,140,.18);--line-strong:rgba(37,84,140,.3);--primary:#2c6fca;--ok:#1f8f6a;--warn:#b98219;--danger:#bf5648;--shadow:0 18px 42px rgba(37,84,140,.16)}
    *{box-sizing:border-box} body{margin:0;font-family:"Segoe UI","PingFang SC","Microsoft YaHei",sans-serif;color:var(--text);background:linear-gradient(180deg,#eef5ff 0%,var(--bg) 100%)}
    .hidden{display:none!important}.shell{padding:24px}.card{background:rgba(255,255,255,.97);border:1px solid rgba(20,33,54,.08);border-radius:22px;box-shadow:var(--shadow)}
    .login{min-height:100vh;display:flex;align-items:center;justify-content:center}.login-card{width:min(980px,100%);display:grid;grid-template-columns:1.08fr .92fr;overflow:hidden}
    .hero{padding:36px;background:linear-gradient(160deg,#cfe0f8 0%,#8eb2df 60%,#557eb8 100%);color:#123456}.hero h1{margin:16px 0 10px;font-size:34px}.hero p,.hero li{color:rgba(18,52,86,.78);line-height:1.7}
    .mini{display:inline-flex;align-items:center;padding:6px 12px;border-radius:999px;background:rgba(47,128,237,.12);color:var(--primary);font-size:12px;font-weight:700;text-transform:uppercase;letter-spacing:.08em}
    .form{padding:30px;display:flex;flex-direction:column;gap:16px;justify-content:center}.form h2{margin:0;font-size:28px}.subtle{color:var(--muted);line-height:1.6}
    .stage-toggle,.actions,.topbar,.lang-switch{display:flex;gap:10px;flex-wrap:wrap}.stage-toggle button{flex:1;min-width:160px}
    .actions{align-items:center;justify-content:flex-start}.actions button{min-width:118px}
    .stage-card{padding:20px;border:1px solid var(--line);border-radius:18px;background:var(--soft);display:grid;gap:14px}
    label{display:block;font-size:12px;font-weight:800;color:var(--muted);margin-bottom:8px;letter-spacing:.03em}
    input,select{width:100%;height:44px;padding:0 14px;border-radius:12px;border:1px solid var(--line);font:inherit;background:#fff;color:var(--text);transition:border-color .18s ease,box-shadow .18s ease,background .18s ease}
    input:hover,select:hover{border-color:var(--line-strong)} input:focus,select:focus{outline:none;border-color:rgba(47,128,237,.45);box-shadow:0 0 0 4px rgba(47,128,237,.12);background:#fbfdff}
    button{height:42px;border:0;border-radius:12px;padding:0 15px;font:inherit;font-weight:700;cursor:pointer;display:inline-flex;align-items:center;justify-content:center;transition:transform .14s ease,box-shadow .14s ease,background .14s ease}
    button:hover{transform:translateY(-1px)}.btn-primary{background:linear-gradient(135deg,#2c6fca,#558fd7);color:#fff;box-shadow:0 10px 24px rgba(44,111,202,.26)}.btn-secondary{background:#dfeafb;color:#234f87}.btn-danger{background:#fff1ee;color:var(--danger)}.btn-ghost{background:#f8fbff;color:var(--text);border:1px solid var(--line)}
    .console{min-height:150px;max-height:280px;overflow:auto;white-space:pre-wrap;border-radius:16px;border:1px solid #88a9d1;background:#e8f0fb;color:#20476f;padding:14px;font-family:Consolas,monospace;font-size:12px;line-height:1.7}
    .app{min-height:100vh;display:grid;grid-template-columns:276px 1fr}.side{background:linear-gradient(180deg,#c8dcf7 0%,#8db1db 55%,#668fc4 100%);color:#123456;padding:24px 20px;display:flex;flex-direction:column;gap:18px;border-right:1px solid rgba(37,84,140,.18)}
    .brand h1{margin:12px 0 6px;font-size:28px}.brand p{margin:0;color:rgba(18,52,86,.72);font-size:14px;line-height:1.6}
    .nav{display:grid;gap:10px}
    .nav button{position:relative;text-align:left;background:rgba(255,255,255,.26);color:rgba(18,52,86,.88);border:1px solid rgba(255,255,255,.3);padding:15px 16px 15px 18px;border-radius:16px;height:auto;min-height:78px;display:flex;flex-direction:column;align-items:flex-start;justify-content:center;gap:8px;backdrop-filter:blur(8px);box-shadow:inset 0 1px 0 rgba(255,255,255,.24);transition:transform .16s ease,box-shadow .16s ease,border-color .16s ease,background .16s ease}
    .nav button::before{content:"";position:absolute;left:10px;top:14px;bottom:14px;width:4px;border-radius:999px;background:linear-gradient(180deg,rgba(47,128,237,0),rgba(47,128,237,.9),rgba(47,128,237,0));opacity:0;transform:scaleY(.7);transition:opacity .16s ease,transform .16s ease}
    .nav button:hover{background:rgba(255,255,255,.46);border-color:rgba(47,128,237,.18);box-shadow:0 12px 26px rgba(47,128,237,.12),inset 0 1px 0 rgba(255,255,255,.28)}
    .nav button:hover::before{opacity:.6;transform:scaleY(1)}
    .nav button.active{background:linear-gradient(180deg,rgba(255,255,255,.92) 0%,rgba(240,247,255,.92) 100%);color:#16385d;border-color:rgba(47,128,237,.24);box-shadow:0 16px 30px rgba(47,128,237,.14),inset 0 1px 0 rgba(255,255,255,.4)}
    .nav button.active::before{opacity:1;transform:scaleY(1)}
    .nav button span{display:block;width:100%;padding-left:12px;font-size:17px;font-weight:800;line-height:1.15;letter-spacing:.01em}
    .nav small{display:block;width:100%;margin-top:0;padding-left:12px;color:rgba(18,52,86,.62);font-size:12px;line-height:1.45}
    .main{padding:24px 24px 28px}.top{display:flex;align-items:flex-start;justify-content:space-between;gap:16px;margin-bottom:18px}.topbar{align-items:center;justify-content:flex-end}
    .lang-switch{padding:4px;border-radius:999px;background:#fff;border:1px solid var(--line)}.lang-switch button{padding:8px 12px;border-radius:999px;background:transparent;color:var(--muted)}.lang-switch button.active{background:var(--primary);color:#fff}
    .admin-chip{padding:10px 14px;border-radius:14px;background:#fff;border:1px solid var(--line);min-width:150px}.admin-chip strong{display:block;font-size:14px}.admin-chip span{display:block;color:var(--muted);font-size:12px}
    .badge{display:inline-flex;align-items:center;padding:7px 12px;border-radius:999px;font-size:12px;font-weight:700;text-transform:uppercase}.ok{background:rgba(31,143,106,.12);color:var(--ok)}.warn{background:rgba(192,138,24,.14);color:var(--warn)}.danger{background:rgba(199,90,74,.12);color:var(--danger)}.info{background:rgba(47,128,237,.12);color:var(--primary)}
    .hint,.item,.metric{padding:18px;border-radius:18px;background:linear-gradient(180deg,rgba(255,255,255,.98) 0%,rgba(247,251,255,.98) 100%);border:1px solid var(--line);display:flex;flex-direction:column;gap:12px;box-shadow:0 10px 24px rgba(47,128,237,.05)}.hint{background:var(--soft-2);border-style:dashed}.item-meta,.desc,.hint,.metric span{color:var(--muted);font-size:13px;line-height:1.6}
    .metrics{display:grid;grid-template-columns:repeat(3,minmax(0,1fr));gap:14px;margin-bottom:18px}.metric label{font-size:11px;text-transform:uppercase;letter-spacing:.08em}.metric strong{display:block;font-size:28px;line-height:1;margin:6px 0 0}
    .panel{display:none;padding:22px}.panel.active{display:block}.head{display:flex;align-items:flex-start;justify-content:space-between;gap:16px;margin-bottom:18px;padding-bottom:14px;border-bottom:1px solid rgba(20,33,54,.06)}.head h3{margin:0;font-size:22px}.grid2{display:grid;grid-template-columns:repeat(2,minmax(0,1fr));gap:14px;align-items:start}.list{display:grid;gap:12px}
    #hubs.list{grid-template-columns:repeat(3,minmax(0,1fr));gap:14px}
    .hub-card{display:flex;flex-direction:column;min-height:100%;box-shadow:0 1px 0 rgba(20,33,54,.02)}
    .hub-card .item-meta{flex:1}
    .hub-card .actions{margin-top:auto;padding-top:4px}
    .hub-card select{margin-top:2px}
    .item-head{display:flex;align-items:flex-start;justify-content:space-between;gap:16px;margin-bottom:2px}.item-title{font-weight:800;font-size:15px;line-height:1.35}.item-title::before{content:"";display:inline-block;width:8px;height:8px;margin-right:8px;border-radius:999px;background:linear-gradient(135deg,#7ab2ff,#2f80ed);vertical-align:middle;box-shadow:0 0 0 4px rgba(47,128,237,.08)}.mono{font-family:Consolas,monospace;font-size:12px;word-break:break-all}
    #tab-policies .grid2 > .item,#tab-system .grid2 > .item{min-height:100%}
    #blockedEmails .item,#blockedIPs .item{padding:14px 15px;border-radius:16px;background:var(--soft);border:1px solid rgba(20,33,54,.08)}
    .hub-card{border-color:rgba(47,128,237,.18)}
    .hub-card .actions{gap:8px}
    .btn-danger{border:1px solid rgba(199,90,74,.18)}
    .btn-danger:hover{box-shadow:0 10px 20px rgba(199,90,74,.12)}
    .toast-stack{position:fixed;top:18px;right:18px;z-index:9999;display:grid;gap:10px;max-width:min(360px,calc(100vw - 36px))}.toast{padding:14px 16px;border-radius:16px;background:#2c5f96;color:#fff;box-shadow:0 16px 36px rgba(47,128,237,.22);border:1px solid rgba(255,255,255,.12);opacity:0;transform:translateY(-8px);transition:opacity .18s ease,transform .18s ease}.toast.show{opacity:1;transform:translateY(0)}.toast.success{background:#23785b}.toast.error{background:#b55246}.toast.info{background:#3a78c7}
    @media (max-width:1080px){.app,.login-card{grid-template-columns:1fr}.metrics{grid-template-columns:repeat(2,minmax(0,1fr))}#hubs.list{grid-template-columns:repeat(2,minmax(0,1fr))}} @media (max-width:760px){.shell,.main{padding:18px}.metrics,.grid2,#hubs.list{grid-template-columns:1fr}.top{flex-direction:column;align-items:flex-start}}
  </style>
</head>
<body>
  <div id="toastStack" class="toast-stack"></div>
  <div id="setupGate" class="hidden" style="position:fixed;top:16px;right:16px;z-index:9998;width:min(480px,calc(100% - 32px))">
    <div class="card" style="padding:20px;position:relative">
      <button type="button" onclick="dismissSetupGate()" style="position:absolute;top:12px;right:14px;background:none;border:none;font-size:20px;color:var(--muted);cursor:pointer;height:auto;padding:0;line-height:1" aria-label="Close">&times;</button>
      <div class="mini"></div>
      <h2 id="setupGateHeading" style="margin:10px 0 6px;font-size:18px"></h2>
      <p class="subtle" id="setupGateDesc" style="font-size:13px"></p>
      <div id="setupGateList" class="stage-card" style="margin-top:12px"></div>
      <div class="actions" style="margin-top:14px">
        <button class="btn-primary" type="button" onclick="openSetupGateTarget()" id="setupGateAction" style="height:36px;font-size:13px"></button>
        <button class="btn-ghost" type="button" onclick="recheckSetupGate()" id="setupGateRefresh" style="height:36px;font-size:13px"></button>
      </div>
    </div>
  </div>
  <div id="loginView" class="login shell">
    <div class="login-card card">
      <div class="hero">
        <div class="mini">MaClaw Hub Center</div>
        <h1 data-i18n="loginHeroTitle"></h1>
        <p data-i18n="loginHeroDesc"></p>
        <ul><li data-i18n="loginBullet1"></li><li data-i18n="loginBullet2"></li><li data-i18n="loginBullet3"></li></ul>
      </div>
      <div class="form">
        <div class="mini" data-i18n="adminAccess"></div>
        <h2 data-i18n="loginTitle"></h2>
        <p class="subtle" id="authStageHint"></p>
        <div id="stageToggle" class="stage-toggle hidden"><button id="setupStageButton" class="btn-secondary" type="button" onclick="showAuthStage('setup')" data-i18n="firstSetup"></button><button id="loginStageButton" class="btn-ghost" type="button" onclick="showAuthStage('login')" data-i18n="adminLogin"></button></div>
        <div id="setupStage" class="stage-card hidden"><h3 data-i18n="firstSetup"></h3><p class="subtle" data-i18n="setupDesc"></p><div><label for="setupUsername" data-i18n="adminUsername"></label><input id="setupUsername" placeholder="admin"></div><div><label for="setupEmail" data-i18n="adminEmail"></label><input id="setupEmail" type="email" placeholder="admin@example.com"></div><div><label for="setupPassword" data-i18n="adminPassword"></label><input id="setupPassword" type="password"></div><div class="actions"><button class="btn-secondary" onclick="setupAdmin()" data-i18n="saveInit"></button></div></div>
        <div id="loginStage" class="stage-card hidden"><h3 data-i18n="adminLogin"></h3><p class="subtle" data-i18n="signinDesc"></p><div><label for="loginUsername" data-i18n="adminUsername"></label><input id="loginUsername" placeholder="admin"></div><div><label for="loginPassword" data-i18n="adminPassword"></label><input id="loginPassword" type="password"></div><div class="actions"><button class="btn-primary" onclick="loginAdmin()" data-i18n="signIn"></button></div></div>
        <div id="loginOutput" class="console"></div>
      </div>
    </div>
  </div>
  <div id="appView" class="app hidden">
    <aside class="side">
      <div class="brand"><div class="mini" style="background:rgba(255,255,255,.1);color:#fff">MaClaw Hub Center</div><h1 data-i18n="brandTitle"></h1><p data-i18n="brandDesc"></p></div>
      <nav class="nav"><button data-tab="overview" class="active" onclick="openTab('overview')"><span data-i18n="navOverview"></span><small data-i18n="navOverviewDesc"></small></button><button data-tab="hubs" onclick="openTab('hubs')"><span data-i18n="navHubs"></span><small data-i18n="navHubsDesc"></small></button><button data-tab="policies" onclick="openTab('policies')"><span data-i18n="navPolicies"></span><small data-i18n="navPoliciesDesc"></small></button><button data-tab="system" onclick="openTab('system')"><span data-i18n="navSystem"></span><small data-i18n="navSystemDesc"></small></button><button data-tab="console" onclick="openTab('console')"><span data-i18n="navConsole"></span><small data-i18n="navConsoleDesc"></small></button><button data-tab="gossip" onclick="openTab('gossip')"><span data-i18n="navGossip"></span><small data-i18n="navGossipDesc"></small></button><button data-tab="skillhub" onclick="openTab('skillhub')"><span data-i18n="navSkillhub"></span><small data-i18n="navSkillhubDesc"></small></button><button data-tab="news" onclick="openTab('news')"><span data-i18n="navNews"></span><small data-i18n="navNewsDesc"></small></button></nav>
      <div class="hint" style="background:rgba(255,255,255,.08);border-color:rgba(255,255,255,.08);color:rgba(255,255,255,.74)"><span data-i18n="defaultEntry"></span><br><span class="mono">https://hubs.mypapers.top</span></div>
    </aside>
    <main class="main">
      <div class="top"><div><h2 id="pageTitle"></h2><div class="subtle" id="pageSubtitle"></div></div><div class="topbar"><div class="lang-switch"><button type="button" data-lang="en" onclick="setLanguage('en')">EN</button><button type="button" data-lang="zh" onclick="setLanguage('zh')">中文</button></div><div class="admin-chip"><strong id="adminDisplayName"></strong><span id="adminDisplayMeta"></span></div><span id="authBadge" class="badge ok"></span><button class="btn-ghost" onclick="logoutAdmin()" data-i18n="logout"></button></div></div>
      <div class="metrics"><div class="metric"><label data-i18n="metricHubs"></label><strong id="hubCountHero">0</strong><span data-i18n="metricHubsHint"></span></div><div class="metric"><label data-i18n="metricBlockedEmails"></label><strong id="blockedEmailCountHero">0</strong><span data-i18n="metricBlockedEmailsHint"></span></div><div class="metric"><label data-i18n="metricBlockedIps"></label><strong id="blockedIPCountHero">0</strong><span data-i18n="metricBlockedIpsHint"></span></div></div>
      <section id="tab-overview" class="panel card active"><div class="head"><div><h3 data-i18n="overviewTitle"></h3><div class="desc" data-i18n="overviewDesc"></div></div><button class="btn-ghost" onclick="refreshAll()" data-i18n="refreshAll"></button></div><div class="grid2"><div class="hint" data-i18n="overviewHint"></div><div class="item"><div class="item-title" data-i18n="discoveryTitle"></div><div class="item-meta" data-i18n="discoveryDesc"></div><div class="mono" style="margin-top:8px;color:var(--text)">https://hubs.mypapers.top</div></div></div></section>
      <section id="tab-hubs" class="panel card"><div class="head"><div><h3 data-i18n="hubsTitle"></h3><div class="desc" data-i18n="hubsDesc"></div></div><button class="btn-ghost" onclick="listHubs()" data-i18n="refreshHubs"></button></div><div id="hubs" class="list"><div class="hint" data-i18n="emptyHubs"></div></div></section>
      <section id="tab-policies" class="panel card"><div class="head"><div><h3 data-i18n="policiesTitle"></h3><div class="desc" data-i18n="policiesDesc"></div></div></div><div class="grid2"><div class="item"><label for="blockedEmail" data-i18n="blockedEmail"></label><input id="blockedEmail" placeholder="blocked@example.com"><label for="blockedEmailReason" style="margin-top:12px" data-i18n="reason"></label><input id="blockedEmailReason"><div class="actions"><button class="btn-danger" onclick="addBlockedEmail()" data-i18n="addEmailBlock"></button></div></div><div class="item"><label for="blockedIP" data-i18n="blockedIp"></label><input id="blockedIP" placeholder="203.0.113.10"><label for="blockedIPReason" style="margin-top:12px" data-i18n="reason"></label><input id="blockedIPReason"><div class="actions"><button class="btn-danger" onclick="addBlockedIP()" data-i18n="addIpBlock"></button></div></div></div><div class="grid2" style="margin-top:18px"><div class="item"><div class="head" style="margin-bottom:12px"><div><div class="item-title" data-i18n="blockedEmailsTitle"></div><div class="item-meta" data-i18n="blockedEmailsDesc"></div></div><button class="btn-ghost" onclick="listBlockedEmails()" data-i18n="reload"></button></div><div id="blockedEmails" class="list"><div class="hint" data-i18n="emptyBlockedEmails"></div></div></div><div class="item"><div class="head" style="margin-bottom:12px"><div><div class="item-title" data-i18n="blockedIpsTitle"></div><div class="item-meta" data-i18n="blockedIpsDesc"></div></div><button class="btn-ghost" onclick="listBlockedIPs()" data-i18n="reload"></button></div><div id="blockedIPs" class="list"><div class="hint" data-i18n="emptyBlockedIps"></div></div></div></div></section>
      <section id="tab-system" class="panel card"><div class="head"><div><h3 data-i18n="systemTitle"></h3><div class="desc" data-i18n="systemDesc"></div></div></div><div class="item"><div class="item-title" id="serverCardTitle"></div><div class="item-meta" id="serverCardDesc" style="margin-bottom:12px"></div><div><label for="serverPublicBaseURL" id="serverPublicBaseURLLabel"></label><input id="serverPublicBaseURL" placeholder="https://center.example.com"></div><div class="actions" style="margin-top:14px"><button class="btn-primary" onclick="saveServerConfig()" id="saveServerConfigButton"></button></div></div><div class="item" style="margin-top:18px"><div class="head" style="margin-bottom:12px"><div><div class="item-title" id="mailCardTitle"></div><div class="item-meta" id="mailCardDesc"></div></div><button class="btn-ghost" onclick="loadMailConfig()" data-i18n="reload"></button></div><div class="grid2"><div><label for="mailProvider" id="mailProviderLabel"></label><select id="mailProvider" onchange="applyMailPreset()"><option value="custom" id="mailPresetCustom"></option><option value="qq" id="mailPresetQQ"></option><option value="163" id="mailPreset163"></option><option value="126" id="mailPreset126"></option><option value="gmail" id="mailPresetGmail"></option><option value="outlook" id="mailPresetOutlook"></option></select></div><div><label for="mailHost" id="mailHostLabel"></label><input id="mailHost" placeholder="smtp.example.com"></div></div><div class="grid2" style="margin-top:12px"><div><label for="mailPort" id="mailPortLabel"></label><input id="mailPort" type="number" min="1" max="65535" placeholder="587"></div><div><label for="mailEncryption" id="mailEncryptionLabel"></label><select id="mailEncryption"><option value="auto" id="mailEncryptionAuto"></option><option value="ssl" id="mailEncryptionSSL"></option><option value="starttls" id="mailEncryptionStartTLS"></option><option value="plain" id="mailEncryptionPlain"></option></select></div></div><div class="gri bleHub')}</button>`:`<button class="btn-danger" onclick="toggleHub('${h.id}',true)">${tr('disableHub')}</button>`}<button class="btn-ghost" onclick="deleteHub('${h.id}')">${tr('deleteHub')}</button></div></div>`}).join('')}

ge>=totalPages}catch(err){setOutput(gtr('loadFailed').replace('{error}',err.message))}};

    async function saveNews(){const id=document.getElementById('newsEditId').value;const body={title:document.getElementById('newsEditTitle').value,content:document.getElementById('newsEditContent').value,category:document.getElementById('newsEditCategory').value,pinned:document.getElementById('newsEditPinned').checked};
      try{if(id){await api('/api/admin/news?id='+encodeURIComponent(id),{method:'PUT',body:JSON.stringify(body)})}else{await api('/api/admin/news',{method:'POST',body:JSON.stringify(body)})}hideNewsEditor();showToast('Saved','success');loadNewsList()}catch(err){showToast(err.message,'error')}}
    async function deleteNews(id){if(!confirm('Delete this article?'))return;try{await api('/api/admin/news?id='+encodeURIComponent(id),{method:'DELETE'});showToast('Deleted','success');loadNewsList()}catch(err){showToast(err.message,'error')}}
  </script>
</body>
</html>
